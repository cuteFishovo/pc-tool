    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        const GRID_SIZE = 10;
        const PIXEL_SIZE = 5;
        const DENSITY_THRESHOLD = 0.42;
        const HOT_CX = 0.45;
        const HOT_CY = 0.35;
        const HOT_RADIUS = 0.25;

        let cells = [];

        function hash2(ix, iy) {
            const s = Math.sin(ix * 127.1 + iy * 311.7) * 43758.5453;
            return s - Math.floor(s);
        }
        function smoothstep(t) {
            return t * t * (3 - 2 * t);
        }
        function valueNoise(x, y) {
            const ix = Math.floor(x);
            const iy = Math.floor(y);
            const fx = smoothstep(x - ix);
            const fy = smoothstep(y - iy);
            const a = hash2(ix, iy);
            const b = hash2(ix + 1, iy);
            const c = hash2(ix, iy + 1);
            const d = hash2(ix + 1, iy + 1);
            return (
                a * (1 - fx) * (1 - fy) +
                b * fx * (1 - fy) +
                c * (1 - fx) * fy +
                d * fx * fy
            );
        }
        function fractalNoise(x, y) {
            let sum = 0;
            let amp = 1;
            let freq = 1;
            let norm = 0;
            for (let i = 0; i < 4; i++) {
                sum += valueNoise(x * freq, y * freq) * amp;
                norm += amp;
                amp *= 0.5;
                freq *= 2;
            }
            return sum / norm;
        }

        class Cell {
            constructor(x, y, isGreen) {
                this.x = x;
                this.y = y;
                this.isGreen = isGreen;
                this.reset(true);
            }
            reset(initial = false) {
                this.phase = 0;
                this.duration = 180 + Math.random() * 260;
                this.delay = initial ? Math.random() * 800 : 200 + Math.random() * 1200;
                this.peakAlpha = this.isGreen ? 0.4 + Math.random() * 0.35 : 0.18 + Math.random() * 0.22;
            }
            update() {
                if (this.delay > 0) {
                    this.delay--;
                    return;
                }
                this.phase++;
                if (this.phase >= this.duration) {
                    this.reset();
                }
            }
            draw(ctx) {
                if (this.delay > 0) return;
                const t = this.phase / this.duration;
                const alpha = Math.sin(t * Math.PI) * this.peakAlpha;
                if (alpha < 0.02) return;
                ctx.fillStyle = this.isGreen ? `rgba(16, 185, 129, ${alpha})` : `rgba(170, 170, 178, ${alpha})`;
                ctx.fillRect(this.x, this.y, PIXEL_SIZE, PIXEL_SIZE);
            }
        }

        function buildCells() {
            cells = [];
            const cols = Math.floor(width / GRID_SIZE);
            const rows = Math.floor(height / GRID_SIZE);
            const noiseScale = 0.05;
            const viewH = window.innerHeight;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const n = fractalNoise(i * noiseScale, j * noiseScale);
                    const py = j * GRID_SIZE;
                    const vFade = Math.max(0.35, 1 - py / (viewH * 2.5));
                    if (n * vFade < DENSITY_THRESHOLD) continue;

                    const nx = i / cols;
                    const ny = j / rows;
                    const dx = nx - HOT_CX;
                    const dy = ny - HOT_CY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const greenProb = Math.max(0, 1 - dist / HOT_RADIUS) * 0.55;
                    const isGreen = Math.random() < greenProb;

                    cells.push(new Cell(i * GRID_SIZE, j * GRID_SIZE, isGreen));
                }
            }
        }

        function resize() {
            width = window.innerWidth;
            height = Math.max(document.documentElement.scrollHeight, window.innerHeight);
            canvas.width = width;
            canvas.height = height;
            buildCells();
        }
        window.addEventListener('resize', resize);
        const ro = new ResizeObserver(() => resize());
        ro.observe(document.body);
        resize();

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < cells.length; i++) {
                cells[i].update();
                cells[i].draw(ctx);
            }
            requestAnimationFrame(animate);
        }
        animate();

        document.querySelectorAll('.card').forEach(card => {
            const inner = card.querySelector('.card-inner');
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const w = rect.width;
                const h = rect.height;
                const px = (x - w / 2) / (w / 2);
                const py = (y - h / 2) / (h / 2);
                const rotateX = -py * 10;
                const rotateY = px * 10;
                inner.style.setProperty('--glare-x', (x / w * 100) + '%');
                inner.style.setProperty('--glare-y', (y / h * 100) + '%');
                inner.style.transform = `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
            });
            card.addEventListener('mouseleave', () => {
                inner.style.transform = '';
            });
        });
    </script>
</body>
</html>
