    <style>
        /* ================= 基础重置 ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #09090b; /* 极深灰/黑背景 */
            color: #f4f4f5;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background-image: linear-gradient(to bottom left, #242323, #131314, #000000);
        }

        /* 背景 Canvas */
        .bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: -1;
            pointer-events: none;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ================= 关键帧动画 ================= */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ================= 页面布局 ================= */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e4e4e7;
        }

        .header-title svg {
            width: 20px;
            height: 20px;
            color: #a1a1aa;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 24px 60px;
            position: relative;
            z-index: 1;
        }

        /* ================= 宣导区 (Hero) ================= */
        .hero {
            margin-bottom: 60px;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .hero h1 span {
            color: #93939c;
        }

        .hero p {
            color: #e9e9e9;
            font-size: 1.125rem;
            max-width: 600px;
            font-weight: 300;
        }

        /* ================= 公告板 ================= */
        .notice {
            background: rgba(24, 24, 27, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 48px;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
            opacity: 0;
        }

        .notice-title {
            font-size: 0.8125rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #cdcdd3;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .notice-content p {
            color: rgb(255, 255, 255);
            font-size: 1.0625rem;
            margin-bottom: 8px;
            font-weight: 300;
        }

        .notice-content p:last-child {
            margin-bottom: 0;
        }

        .notice-content a {
            color: #b8b8b8;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-color: #52525b;
            transition: text-decoration-color 0.3s;
        }

        .notice-content a:hover {
            text-decoration-color: #cdcdd3;
        }

        /* ================= 工具网格 ================= */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        /* ================= 工具卡片 ================= */

            display: flex;

            background: rgba(24, 24, 27, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);

            cursor: pointer;

            -webkit-backdrop-filter: blur(30px);
        }

        /* 交错加载动画 */
        .card:nth-child(1) { animation-delay: 0.15s; }
        .card:nth-child(2) { animation-delay: 0.20s; }
        .card:nth-child(3) { animation-delay: 0.25s; }
        .card:nth-child(4) { animation-delay: 0.30s; }
        .card:nth-child(5) { animation-delay: 0.35s; }
        .card:nth-child(6) { animation-delay: 0.40s; }
        .card:nth-child(7) { animation-delay: 0.45s; }
        .card:nth-child(8) { animation-delay: 0.50s; }

            background: rgba(55, 55, 60, 0.75);
            border-color: rgba(255, 255, 255, 0.35);

        .card::after {

            top: 0;
            left: 0;

            height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.18), transparent 60%);

    <!-- 高性能前端 JS：生成 trae.ai 风格的地图点阵背景 -->
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 网格步长（点阵间距）
        const GRID_SIZE = 10;
        // 实际绘制的像素方块大小
        const PIXEL_SIZE = 5;
        // 密度阈值：噪声值高于此才生成像素点（越高越稀疏）
        const DENSITY_THRESHOLD = 0.42;
        // 绿色热点区域中心（归一化坐标：0-1）
        const HOT_CX = 0.45;
        const HOT_CY = 0.35;
        const HOT_RADIUS = 0.25;

        // 所有像素单元
        let cells = [];

        // 二维伪随机哈希：sin 哈希法，避免 JS 位运算 32-bit 溢出
        function hash2(ix, iy) {
            const s = Math.sin(ix * 127.1 + iy * 311.7) * 43758.5453;
            return s - Math.floor(s);
        }
        function smoothstep(t) {
            return t * t * (3 - 2 * t);
        }
        function valueNoise(x, y) {
            const ix = Math.floor(x);
            const iy = Math.floor(y);
            const fx = smoothstep(x - ix);
            const fy = smoothstep(y - iy);
            const a = hash2(ix, iy);
            const b = hash2(ix + 1, iy);
            const c = hash2(ix, iy + 1);
            const d = hash2(ix + 1, iy + 1);
            return (
                a * (1 - fx) * (1 - fy) +
                b * fx * (1 - fy) +
                c * (1 - fx) * fy +
                d * fx * fy
            );
        }
        // 分形噪声：多层叠加，形成大陆状聚集
        function fractalNoise(x, y) {
            let sum = 0;
            let amp = 1;
            let freq = 1;
            let norm = 0;
            for (let i = 0; i < 4; i++) {
                sum += valueNoise(x * freq, y * freq) * amp;
                norm += amp;
                amp *= 0.5;
                freq *= 2;
            }
            return sum / norm;
        }

        // 单个像素单元：延迟 → 淡入 → 峰值 → 淡出 → 重生
        class Cell {
            constructor(x, y, isGreen) {
                this.x = x;
                this.y = y;
                this.isGreen = isGreen;
                this.reset(true);
            }
            reset(initial = false) {
                this.phase = 0;
                // 一次呼吸的总帧数
                this.duration = 180 + Math.random() * 260;
                // 首次亮起前的等待帧数（初始化随机分布，避免同步）
                this.delay = initial
                    ? Math.random() * 800
                    : 200 + Math.random() * 1200;
                // 峰值不透明度：绿色更醒目
                this.peakAlpha = this.isGreen
                    ? 0.4 + Math.random() * 0.35
                    : 0.18 + Math.random() * 0.22;
            }
            update() {
                if (this.delay > 0) {
                    this.delay--;
                    return;
                }
                this.phase++;
                if (this.phase >= this.duration) {
                    this.reset();
                }
            }
            draw(ctx) {
                if (this.delay > 0) return;
                // 钟形曲线：sin(πt) 天然流畅的淡入淡出
                const t = this.phase / this.duration;
                const alpha = Math.sin(t * Math.PI) * this.peakAlpha;
                if (alpha < 0.02) return;
                ctx.fillStyle = this.isGreen
                    ? `rgba(16, 185, 129, ${alpha})`
                    : `rgba(170, 170, 178, ${alpha})`;
                ctx.fillRect(this.x, this.y, PIXEL_SIZE, PIXEL_SIZE);
            }
        }

        // 根据分形噪声掩膜生成像素点：模拟大陆状聚集
        function buildCells() {
            cells = [];
            const cols = Math.floor(width / GRID_SIZE);
            const rows = Math.floor(height / GRID_SIZE);
            // 噪声采样缩放：值越小，"大陆"块越大
            const noiseScale = 0.05;
            // 首屏高度：作为垂直衰减参考
            const viewH = window.innerHeight;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    // 采样分形噪声作为密度掩膜
                    const n = fractalNoise(i * noiseScale, j * noiseScale);

                    // 垂直衰减：首屏顶部最密集，越往下越稀疏（但底部仍保留少量点）
                    const py = j * GRID_SIZE;
                    const vFade = Math.max(0.35, 1 - py / (viewH * 2.5));

                    // 密度阈值判断
                    if (n * vFade < DENSITY_THRESHOLD) continue;

                    // 判断是否落在绿色热点区域内
                    const nx = i / cols;
                    const ny = j / rows;
                    const dx = nx - HOT_CX;
                    const dy = ny - HOT_CY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    // 越靠近热点中心，绿色概率越高
                    const greenProb = Math.max(0, 1 - dist / HOT_RADIUS) * 0.55;
                    const isGreen = Math.random() < greenProb;

                    cells.push(new Cell(i * GRID_SIZE, j * GRID_SIZE, isGreen));
                }
            }
        }

        function resize() {
            width = window.innerWidth;
            height = Math.max(document.documentElement.scrollHeight, window.innerHeight);
            canvas.width = width;
            canvas.height = height;
            buildCells();
        }
        window.addEventListener('resize', resize);
        // 监听内容变化，动态更新 canvas 高度
        const ro = new ResizeObserver(() => resize());
        ro.observe(document.body);
        resize();

        // 渲染循环
        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < cells.length; i++) {
                cells[i].update();
                cells[i].draw(ctx);
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
