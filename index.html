<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            padding-top: 60px;
            padding-bottom: 80px;
        }

        .top-bar {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 18px 0;
            font-size: 24px;
            font-weight: bold;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 999;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .notice-area {
            background-color: #f8f9fa;
            border-left: 4px solid #1677ff;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 5px;
            font-size: 16px;
            line-height: 1.6;
        }
        /* 分界线 */
        .divider {
            height: 2px;
            background-color: #e5e7eb;
            margin: 30px 0;
        }

        /* 按钮 */
        .func-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .func-btn {
            background-color: #226bb4;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 22px 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .func-btn:hover {
            background-color: #2377ff;
            transform: translateY(-3px);
        }

        .bottom-bar {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 15px;
            line-height: 1.6;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="top-bar">工具箱</div>

<div class="container">
    <div class="notice-area">
        <strong>为人民服务 不收一分钱 只为爱发电</strong>
    </div>
    <div class="notice-area">
        <strong>公告：</strong>前所有网站已搬运到"pc-tool.cn"把工具进行整理<br>
        网站配色更改(感觉还是怪怪的)<br>
        增加功能按钮(分类屎)
    </div>
    <div class="notice-area">
        <strong>我们的新服务!!! 网站 & 文件 托管!!! 详情请访问 https://frp-bus.com:49573/</strong>
    </div>

    <div class="divider"></div>

    <div class="func-area">
        <button class="func-btn" onclick="window.open('https://pc-tool.cn/converter/','_blank')">格式转换</button>
        <button class="func-btn" onclick="window.open('https://pc-tool.cn/vrc-url/','_blank')">B站视频转URL</button>
        <button class="func-btn" onclick="window.open('https://pc-tool.cn/converter/','_blank')">视频解析(第三方)</button>
        <button class="func-btn" onclick="window.open('https://pc-tool.cn/converter/','_blank')">音频解析(第三方)</button>
        <button class="func-btn" onclick="window.open('https://pc-tool.cn/converter/','_blank')">图片拼接</button>
        <button class="func-btn" onclick="window.open('https://frp-bus.com:49573/','_blank')">网站 & 文件 托管</button>
    </div>
</div>

<div class="bottom-bar">
    面对大众 自制或收集一些有用的在线工具<br>
    如果您有什么需要的功能或意见请联系我 QQ:1003294905
</div>

</body>
</html>
