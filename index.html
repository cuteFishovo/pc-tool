<head>

    <style>
        /* ================= 基础重置 ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #09090b; /* 极深灰/黑背景 */
            color: #f4f4f5;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background-image: linear-gradient(to bottom left, #242323, #131314, #000000);
            background-attachment: fixed;
        }

        /* 背景 Canvas */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ================= 关键帧动画 ================= */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ================= 页面布局 ================= */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e4e4e7;
        }

        .header-title svg {
            width: 20px;
            height: 20px;
            color: #a1a1aa;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 24px 60px;
            position: relative;
            z-index: 1;
        }

        /* ================= 宣导区 (Hero) ================= */
        .hero {
            margin-bottom: 60px;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .hero h1 span {
            color: #93939c;
        }

        .hero p {
            color: #e9e9e9;
            font-size: 1.125rem;
            max-width: 600px;
            font-weight: 300;
        }

        /* ================= 公告板 ================= */
        .notice {
            background: rgba(24, 24, 27, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 48px;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
            opacity: 0;
        }

        .notice-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #cdcdd3;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .notice-content p {
            color: rgb(255, 255, 255);
            font-size: 0.95rem;
            margin-bottom: 8px;
            font-weight: 300;
        }

        .notice-content p:last-child {
            margin-bottom: 0;
        }

        .notice-content a {

            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-color: #52525b;

        }

        .card:nth-child(1) { animation-delay: 0.15s; }
        .card:nth-child(2) { animation-delay: 0.20s; }
        .card:nth-child(3) { animation-delay: 0.25s; }
        .card:nth-child(4) { animation-delay: 0.30s; }
        .card:nth-child(5) { animation-delay: 0.35s; }
        .card:nth-child(6) { animation-delay: 0.40s; }
        .card:nth-child(7) { animation-delay: 0.45s; }

        .card:hover {
            transform: translateY(-8px) scale(1.04);
            background: rgba(39, 39, 42, 0.6);
            border-color: rgba(255, 255, 255, 0.2);

            left: 0;

    <!-- 高性能前端 JS：生成生物感流体网格粒子 -->
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // 像素网格大小
        const GRID_SIZE = 8;
        // 实际绘制的方块大小 (留出间隙)
        const PIXEL_SIZE = 6;
        // 根据屏幕大小动态计算蠕虫数量，保证性能
        let WORM_COUNT = Math.floor((width * height) / 12000); 

        class Worm {
            constructor() {
                this.init(true);
            }
            init(randomizeLife = false) {
                this.x = Math.random() * (width / GRID_SIZE);
                this.y = Math.random() * (height / GRID_SIZE);
                this.angle = Math.random() * Math.PI * 2; 
                this.speed = Math.random() * 0.15 + 0.05;
                this.history = [];
                // 蠕虫的长度（即粒子的尾巴长度）
                this.maxLength = Math.floor(Math.random() * 80 + 30);
                this.turnSpeed = (Math.random() - 0.5) * 0.05;
                
                // Trae.ai 风格的调色盘：亮绿、深绿、浅灰、深灰
                const colors = [
                    'rgba(16, 185, 129, ', // Emerald 500
                    'rgba(5, 150, 105, ',  // Emerald 600
                    'rgba(113, 113, 122, ', // Zinc 500
                    'rgba(63, 63, 70, '     // Zinc 700
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                if (randomizeLife) {
                    let preFill = Math.floor(Math.random() * this.maxLength);
                    for(let i=0; i<preFill; i++) {
                        this.update(true);
                    }
                }
            }
            update(isInit = false) {
                // 核心：使用简单的正弦/余弦流场模拟生物群游的路径
                let flowAngle = Math.sin(this.x * 0.05) * Math.cos(this.y * 0.05) * Math.PI * 2;
                // 缓动跟随流场
                this.angle += (flowAngle - this.angle) * 0.02 + this.turnSpeed;
                
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                let gx = Math.floor(this.x);
                let gy = Math.floor(this.y);
                
                // 只有当跨越到新的网格时才记录，形成像素化的移动感
                if (this.history.length === 0 || this.history[this.history.length-1].x !== gx || this.history[this.history.length-1].y !== gy) {
                    this.history.push({x: gx, y: gy});
                    if (this.history.length > this.maxLength) {
                        this.history.shift();
                    }
                }
                
                // 超出屏幕后重生
                if (!isInit && (this.x < -15 || this.x > (width / GRID_SIZE) + 15 || this.y < -15 || this.y > (height / GRID_SIZE) + 15)) {
                    this.init();
                }
            }
            draw(ctx) {
                for (let i = 0; i < this.history.length; i++) {
                    const pos = this.history[i];
                    const px = pos.x * GRID_SIZE;
                    const py = pos.y * GRID_SIZE;
                    
                    let alpha = 0;
                    const progress = i / this.history.length;
                    
                    // 模拟蠕虫的首尾淡入淡出，形成生物流动的质感
                    if (progress > 0.8) {
                        alpha = (1 - progress) * 5; // 头部渐显
                    } else if (progress < 0.2) {
                        alpha = progress * 5; // 尾部渐隐
                    } else {
                        alpha = 1;
                    }
                    
                    // 偶尔的像素闪烁，增加科技感
                    if (Math.random() > 0.98) alpha *= 0.3;

                    ctx.fillStyle = this.color + alpha + ')';
                    ctx.fillRect(px, py, PIXEL_SIZE, PIXEL_SIZE);
                }
            }
        }

        let worms = Array.from({length: WORM_COUNT}, () => new Worm());

        // 响应式调整粒子数量
        window.addEventListener('resize', () => {
            let newCount = Math.floor((window.innerWidth * window.innerHeight) / 12000);
            if (newCount > worms.length) {
                for(let i=0; i<newCount - worms.length; i++) worms.push(new Worm());
            } else {
                worms = worms.slice(0, newCount);
            }
        });

        // 渲染循环
        function animate() {
            // 清空画布，不保留拖影，因为历史轨迹已在Worm内部记录
            ctx.clearRect(0, 0, width, height);
            worms.forEach(worm => {
                worm.update();
                worm.draw(ctx);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
