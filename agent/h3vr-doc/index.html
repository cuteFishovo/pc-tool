<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转托管页面</title>
    <style>
        /* 页面居中美化 */
        body {
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f5f5f5;
        }

        /* 图片样式 */
        img {
            max-width: 500px;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 按钮样式 */
        button {
            margin-top: 30px;
            padding: 14px 30px;
            font-size: 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>如果您显示这个画面 请按图片中操作</h1>
    <img src="./photo.jpg" alt="展示图片">
    <button onclick="window.location.href='https://frp-bus.com:49573/h3vr-doc/'">我已知晓</button>
</body>
</html>
