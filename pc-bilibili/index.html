<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内嵌B站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f4f4f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #fb7299;
            color: white;
            padding: 16px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            flex: 1;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            width: 100%;
        }

        .title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #videoUrl {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
            min-width: 200px;
        }

        #videoUrl:focus {
            border-color: #fb7299;
        }

        #loadBtn {
            padding: 12px 25px;
            background-color: #fb7299;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #loadBtn:hover {
            background-color: #ff85a8;
        }

        .video-box {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 比例 */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            background: white;
            margin-top: auto;
        }
    </style>
</head>
<body>

<header>
    内嵌Bilibili
</header>

<div class="container">
    <h2 class="title">B站内嵌播放器</h2>
    
    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="可放入手机端链接 显示电脑端画面" value="https://www.bilibili.com/">
        <button id="loadBtn">加载视频</button>
    </div>

    <div class="video-box">
        <iframe id="videoFrame" src="https://www.bilibili.com/" 
                scrolling="no" 
                frameborder="no" 
                allowfullscreen="true">
        </iframe>
    </div>
</div>

<footer>
    pc-tool.cn 内嵌B站网页 &copy; 2026 网站不会收集用户信息 只是为手机用户提供pc端画面
</footer>

<script>
    const loadBtn = document.getElementById('loadBtn');
    const videoUrl = document.getElementById('videoUrl');
    const videoFrame = document.getElementById('videoFrame');

    loadBtn.addEventListener('click', function() {
        let url = videoUrl.value.trim();
        if (url) {
            videoFrame.src = url;
        }
    });

    videoUrl.addEventListener('keyup', function(e) {
        if (e.key === 'Enter') {
            loadBtn.click();
        }
    });
</script>

</body>
</html>
