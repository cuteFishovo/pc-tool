<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内嵌B站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f4f4f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #fb7299;
            color: white;
            padding: 16px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            flex: 1;
            width: 100%;
            padding: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #bilibiliUrl {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        #bilibiliUrl:focus {
            border-color: #fb7299;
        }

        #goBtn {
            padding: 12px 18px;
            background: #fb7299;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        /* 核心：外层容器，负责缩放显示完整电脑版 */
        .iframe-container {
            width: 100%;
            height: 88vh;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        /* 内嵌框架：宽度1280px（电脑宽度），自动缩放适配手机 */
        #pcFrame {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px;    /* 电脑端宽度 */
            height: 100%;
            border: none;
            transform-origin: top left;
            transform: scale(calc(100vw / 1280)); /* 自动缩放到手机全屏 */
        }

        footer {
            text-align: center;
            padding: 15px;
            color: #666;
            background: #fff;
        }
    </style>
</head>

<body>
<header>内嵌Bilibili（电脑版）</header>

<div class="container">
    <div class="input-group">
        <input type="text" id="bilibiliUrl" value="https://www.bilibili.com/">
        <button id="goBtn">加载PC版</button>
    </div>

    <div class="iframe-container">
        <iframe id="pcFrame" src="" scrolling="yes" allowfullscreen></iframe>
    </div>
</div>

<footer>
    pc-tool.cn &copy; 2026 网页不会收集用户信息 只为移动端用户显示pc端画面
</footer>

<script>
    const frame = document.getElementById('pcFrame');
    const urlInput = document.getElementById('bilibiliUrl');
    const goBtn = document.getElementById('goBtn');

    // 核心：伪造电脑端浏览器标识，强制显示PC版
    function loadPCWebsite(url) {
        frame.src = `javascript:(function(){
            Object.defineProperty(navigator, 'userAgent', {
                value: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0.0.0 Safari/537.36'
            });
            window.location.href = ${JSON.stringify(url)};
        })()`;
    }

    // 初始加载
    loadPCWebsite(urlInput.value);

    // 按钮加载
    goBtn.onclick = () => loadPCWebsite(urlInput.value);

    // 回车加载
    urlInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') goBtn.click();
    });
</script>
</body>
</html>
