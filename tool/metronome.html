<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>节拍器（BPM） | PC-TOOL</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="description" content="免费在线节拍器工具，精准BPM节拍，支持键盘空格快捷启停，纯浏览器端运行。">
  <link rel="stylesheet" href="common.css">
  <meta property="og:title" content="节拍器（BPM） | PC-TOOL">
  <meta property="og:description" content="免费在线节拍器工具，精准BPM节拍，支持键盘空格快捷启停。">
  <meta property="og:image" content="https://www.pc-tool.cn/avatar.jpg">
  <meta property="og:url" content="https://www.pc-tool.cn/tool/metronome.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="PC-TOOL">
  <meta property="og:locale" content="zh_CN">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    .container h1 {
      font-size: 1.8rem;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: #e4e4e7;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .container h1 span {
      background: rgba(79, 70, 229, 0.2);
      color: #818cf8;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(129, 140, 248, 0.2);
    }

    /* ====== 摆臂 ====== */
    .pendulum-box {
      width: 200px;
      height: 130px;
      margin: 0 auto 8px;
      position: relative;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .pendulum-box.visible {
      opacity: 1;
      visibility: visible;
    }
    /* 中心辅助线（垂直虚线） */
    .pendulum-centerline {
      position: absolute;
      top: 10px;
      bottom: 18px;
      left: 50%;
      width: 0;
      border-left: 1px dashed rgba(161, 161, 170, 0.15);
      z-index: 0;
    }
    /* 顶部枢轴小圆点 */
    .pendulum-pivot {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(161, 161, 170, 0.6);
      z-index: 2;
    }
    /* 摆臂（杆）围绕顶部旋转 */
    .pendulum-arm {
      position: absolute;
      top: 5px;
      left: 50%;
      transform-origin: top center;
      width: 3px;
      height: 100px;
      margin-left: -1.5px;
      background: linear-gradient(to bottom, rgba(161, 161, 170, 0.7), rgba(161, 161, 170, 0.4));
      border-radius: 2px;
      will-change: transform;
      z-index: 1;
    }
    /* 摆锤（底端小圆块） */
    .pendulum-weight {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(161, 161, 170, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* 圆形开关按钮 */
    .metronome-btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 3px solid rgba(129, 140, 248, 0.3);
      background: rgba(24, 24, 27, 0.5);
      color: #e4e4e7;
      font-size: 1.4rem;
      font-weight: 500;
      cursor: pointer;
      transition: 
        transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
        border-color 0.3s ease,
        background 0.3s ease,
        box-shadow 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      position: relative;
    }
    .metronome-btn:hover {
      border-color: rgba(129, 140, 248, 0.5);
      background: rgba(39, 39, 42, 0.6);
      transform: scale(1.05);
    }
    .metronome-btn:active {
      transform: scale(0.92);
    }
    .metronome-btn.running {
      border-color: rgba(239, 68, 68, 0.5);
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
    }
    /* 节拍弹性脉冲 */
    .metronome-btn.beat {
      border-color: rgba(129, 140, 248, 0.8);
      background: rgba(129, 140, 248, 0.25);
      box-shadow: 0 0 40px rgba(129, 140, 248, 0.3);
      transform: scale(1.08);
      transition: 
        transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
        border-color 0.15s ease,
        background 0.15s ease,
        box-shadow 0.15s ease;
    }
    .metronome-btn.running.beat {
      border-color: rgba(239, 68, 68, 0.8);
      background: rgba(239, 68, 68, 0.25);
      box-shadow: 0 0 40px rgba(239, 68, 68, 0.3);
    }
    /* 拍子结束回弹 */
    .metronome-btn.release {
      transform: scale(1);
      transition: 
        transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
        border-color 0.35s ease,
        background 0.35s ease,
        box-shadow 0.35s ease;
    }

    /* BPM输入区 */
    .bpm-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .bpm-label {
      font-size: 1.1rem;
      color: #a1a1aa;
      font-weight: 500;
    }
    .bpm-input {
      width: 100px;
      padding: 10px 14px;
      font-size: 1.2rem;
      text-align: center;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: #e4e4e7;
      outline: none;
      transition: border-color 0.2s;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    }
    .bpm-input:focus {
      border-color: rgba(129, 140, 248, 0.5);
    }
    /* 移除数字输入框的上下箭头 */
    .bpm-input::-webkit-outer-spin-button,
    .bpm-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }
    .bpm-input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    /* 提示文字 */
    .hint {
      font-size: 0.85rem;
      color: #52525b;
      margin-top: 4px;
    }
    .hint kbd {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      font-family: inherit;
      font-size: 0.82rem;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <canvas class="bg-canvas" id="bgCanvas"></canvas>
  <a href="../index.html" class="back-link">&larr; 返回首页</a>

  <div class="container">
    <h1>节拍器 <span>BPM</span></h1>

    <!-- 摆臂 -->
    <div class="pendulum-box" id="pendulumBox">
      <div class="pendulum-centerline"></div>
      <div class="pendulum-pivot"></div>
      <div class="pendulum-arm" id="pendulumArm">
        <div class="pendulum-weight"></div>
      </div>
    </div>

    <!-- 圆形开关按钮 -->
    <button class="metronome-btn" id="toggleBtn" title="点击或按空格键启停">启动</button>

    <!-- BPM输入 -->
    <div class="bpm-row">
      <span class="bpm-label">BPM：</span>
      <input type="number" class="bpm-input" id="bpmInput" value="120" min="20" max="1000" step="1">
    </div>

    <!-- 提示 -->
    <p class="hint">按 <kbd>空格</kbd> 键启动 / 停止节拍器</p>
  </div>

  <script>
    (function() {
      // ---- 背景粒子（与首页风格一致） ----
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let w, h;
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const particles = [];
      const COUNT = 60;
      for (let i = 0; i < COUNT; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: Math.random() * 1.5 + 0.5,
        });
      }

      function drawBg() {
        ctx.clearRect(0, 0, w, h);
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.06)';
          ctx.fill();
        }
        requestAnimationFrame(drawBg);
      }
      drawBg();

      // ---- 节拍器逻辑 ----
      const btn = document.getElementById('toggleBtn');
      const bpmInput = document.getElementById('bpmInput');
      const pendulumBox = document.getElementById('pendulumBox');
      const pendulumArm = document.getElementById('pendulumArm');
      let bpm = parseInt(bpmInput.value) || 120;
      let running = false;
      let beatTimer = null;     // setInterval 定时器（后台也能运行）
      let rafId = null;         // rAF（仅驱动摆臂动画）
      let startTime = 0;        // 启动时间基准
      let beatTimeout = null;   // 按钮脉冲闪烁 timeout
      let beatCount = 0;        // 已走过的拍数，用于 BPM 修改时计算偏移

      const MAX_ANGLE = 25;     // 最大摆角（度）

      // Web Audio API
      let audioCtx = null;
      function getAudioCtx() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
      }

      function playClick() {
        try {
          const ctx = getAudioCtx();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 800;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.08);
        } catch (e) { /* 静默 */ }
      }

      function flashBeat() {
        btn.classList.remove('release');
        btn.classList.add('beat');
        if (beatTimeout) clearTimeout(beatTimeout);
        beatTimeout = setTimeout(() => {
          btn.classList.remove('beat');
          btn.classList.add('release');
        }, 100);
      }

      function beat() {
        beatCount++;
        flashBeat();
        playClick();
      }

      // rAF：仅驱动摆臂旋转（标签页隐藏时暂停，恢复后自动跟上）
      function pendulumLoop(timestamp) {
        if (!running) return;
        const elapsed = timestamp - startTime;
        const beatInterval = 60000 / bpm;
        const period = beatInterval * 2;
        const omega = (2 * Math.PI) / period;
        const angleDeg = (MAX_ANGLE * Math.PI / 180) * Math.sin(omega * elapsed) * 180 / Math.PI;
        pendulumArm.style.transform = 'rotate(' + angleDeg + 'deg)';
        rafId = requestAnimationFrame(pendulumLoop);
      }

      function start() {
        running = true;
        btn.textContent = '关闭';
        btn.classList.add('running');
        bpmInput.disabled = false;
        bpm = parseInt(bpmInput.value) || 120;
        beatCount = 0;

        // 显示摆臂
        pendulumBox.classList.add('visible');
        startTime = performance.now();
        pendulumArm.style.transform = 'rotate(0deg)';

        // 立即打第一拍
        beat();

        // setInterval 从第二拍开始
        const beatInterval = 60000 / bpm;
        beatTimer = setInterval(beat, beatInterval);

        // rAF 驱动摆臂动画
        rafId = requestAnimationFrame(pendulumLoop);
      }

      function stop() {
        running = false;
        btn.textContent = '启动';
        btn.classList.remove('running', 'beat', 'release');
        bpmInput.disabled = false;

        // 隐藏摆臂
        pendulumBox.classList.remove('visible');
        pendulumArm.style.transform = 'rotate(0deg)';

        if (beatTimer) { clearInterval(beatTimer); beatTimer = null; }
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        if (beatTimeout) { clearTimeout(beatTimeout); beatTimeout = null; }
      }

      function toggle() {
        if (running) { stop(); } else { start(); }
      }

      // 按钮点击
      btn.addEventListener('click', toggle);

      // 空格键启停（防止页面滚动）
      window.addEventListener('keydown', function(e) {
        if (e.code === 'Space' && e.target === document.body) {
          e.preventDefault();
          toggle();
        }
        // BPM 输入框按回车确认
        if (e.code === 'Enter' && document.activeElement === bpmInput) {
          e.preventDefault();
          let val = parseInt(bpmInput.value);
          if (isNaN(val) || val < 20) val = 20;
          if (val > 1000) val = 1000;
          bpmInput.value = val;
          bpm = val;
          // 如果正在运行，重启以应用新BPM
          if (running) {
            stop();
            start();
          }
          bpmInput.blur();
        }
      });

      // 输入框失去焦点时自动修正范围
      bpmInput.addEventListener('blur', function() {
        let val = parseInt(bpmInput.value);
        if (isNaN(val) || val < 20) val = 20;
        if (val > 1000) val = 1000;
        bpmInput.value = val;
        if (!running) {
          bpm = val;
        }
      });
    })();
  </script>
</body>
</html>
