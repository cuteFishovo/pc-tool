    <script src="common.js"></script>

    <script>
        const base64Input = document.getElementById('base64Input');
        const decodeBtn = document.getElementById('decodeBtn');
        const errorMsg = document.getElementById('errorMsg');
        const previewArea = document.getElementById('previewArea');
        const infoRow = document.getElementById('infoRow');
        const imgDimensions = document.getElementById('imgDimensions');
        const imgType = document.getElementById('imgType');
        const downloadBtn = document.getElementById('downloadBtn');

        let currentDataUri = '';
        let currentMime = '';

        decodeBtn.onclick = () => {
            errorMsg.style.display = 'none';
            const raw = base64Input.value.trim();
            if (!raw) {
                errorMsg.textContent = '请输入 Base64 字符串';
                errorMsg.style.display = 'block';
                return;
            }

            let dataUri;
            // 判断是否已经带了 data: 前缀
            if (raw.startsWith('data:image/')) {
                dataUri = raw;
            } else {
                // 尝试自动检测图片类型（通过 Base64 魔数头）
                let header = raw.substring(0, 30);
                let mime = 'image/png'; // 默认
                if (header.startsWith('/9j/')) {
                    mime = 'image/jpeg';
                } else if (header.startsWith('iVBORw0KGgo')) {
                    mime = 'image/png';
                } else if (header.startsWith('R0lGOD')) {
                    mime = 'image/gif';
                } else if (header.startsWith('UklGR')) {
                    mime = 'image/webp';
                } else if (header.startsWith('Qk')) {
                    mime = 'image/bmp';
                } else if (header.startsWith('PHN2Zy') || raw.startsWith('<svg')) {
                    mime = 'image/svg+xml';
                    dataUri = 'data:image/svg+xml;base64,' + raw;
                }
                if (!dataUri) {
                    dataUri = 'data:' + mime + ';base64,' + raw;
                }
            }

            currentDataUri = dataUri;
            const img = new Image();
            img.onload = () => {
                errorMsg.style.display = 'none';
                previewArea.innerHTML = '<img src="' + dataUri + '" alt="解码结果">';
                imgDimensions.textContent = '尺寸：' + img.width + ' × ' + img.height;
                currentMime = dataUri.split(';')[0].replace('data:', '');
                imgType.textContent = '格式：' + currentMime.replace('image/', '').toUpperCase();
                infoRow.style.display = 'flex';
                downloadBtn.style.display = 'inline-block';
            };
            img.onerror = () => {
                errorMsg.textContent = '解码失败，请检查 Base64 字符串是否正确';
                errorMsg.style.display = 'block';
                previewArea.innerHTML = '<p style="color: #71717a;">解码后在此显示图片预览</p>';
                infoRow.style.display = 'none';
                downloadBtn.style.display = 'none';
            };
            img.src = dataUri;
        };

        downloadBtn.onclick = () => {
            if (!currentDataUri) return;
            const ext = currentMime.replace('image/', '') || 'png';
            const a = document.createElement('a');
            a.href = currentDataUri;
            a.download = '解码图片-Base64转图片.' + (ext === 'jpeg' ? 'jpg' : ext === 'svg+xml' ? 'svg' : ext);
            a.click();
        };

        // 支持 Ctrl+Enter 快捷解码
        base64Input.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                decodeBtn.click();
            }
        });
    </script>
