    <script>
        const stitchUploadArea = document.getElementById('stitchUploadArea');
        const stitchFileInput = document.getElementById('stitchFileInput');
        const stitchPreviewList = document.getElementById('stitchPreviewList');
        const stitchBtn = document.getElementById('stitchBtn');
        const stitchDownloadBtn = document.getElementById('stitchDownloadBtn');
        const stitchOutputFormat = document.getElementById('stitchOutputFormat');
        const stitchResultBox = document.getElementById('stitchResultBox');
        const stitchedImage = document.getElementById('stitchedImage');
        const layoutSelector = document.getElementById('layoutSelector');

        const outWidthEl = document.getElementById('outWidth');
        const outHeightEl = document.getElementById('outHeight');
        const fitModeGroup = document.getElementById('fitModeGroup');
        const fitModeBtns = document.querySelectorAll('.fit-mode-btn');

        let stitchImages = [];
        let stitchedUrl = null;
        let currentLayout = null;
        let fitMode = 'none';

        const layoutTemplates = {
            1: [{ name: '单张', cols: 1, rows: 1, calc: () => [{ x: 0, y: 0, w: 1, h: 1 }] }],
            2: [
                { name: '横向并排', cols: 2, rows: 1, calc: () => [{ x: 0, y: 0, w: 0.5, h: 1 }, { x: 0.5, y: 0, w: 0.5, h: 1 }] },
                { name: '纵向叠加', cols: 1, rows: 2, calc: () => [{ x: 0, y: 0, w: 1, h: 0.5 }, { x: 0, y: 0.5, w: 1, h: 0.5 }] }
            ],
            3: [
                { name: '三图横排', cols: 3, rows: 1, calc: () => [{ x: 0, y: 0, w: 1 / 3, h: 1 }, { x: 1 / 3, y: 0, w: 1 / 3, h: 1 }, { x: 2 / 3, y: 0, w: 1 / 3, h: 1 }] },
                { name: '三图竖排', cols: 1, rows: 3, calc: () => [{ x: 0, y: 0, w: 1, h: 1 / 3 }, { x: 0, y: 1 / 3, w: 1, h: 1 / 3 }, { x: 0, y: 2 / 3, w: 1, h: 1 / 3 }] },
                { name: '左一右二', cols: 2, rows: 2, calc: () => [{ x: 0, y: 0, w: 0.5, h: 1 }, { x: 0.5, y: 0, w: 0.5, h: 0.5 }, { x: 0.5, y: 0.5, w: 0.5, h: 0.5 }] },
                { name: '左二右一', cols: 2, rows: 2, calc: () => [{ x: 0, y: 0, w: 0.5, h: 0.5 }, { x: 0, y: 0.5, w: 0.5, h: 0.5 }, { x: 0.5, y: 0, w: 0.5, h: 1 }] },
                { name: '上一下二', cols: 2, rows: 2, calc: () => [{ x: 0, y: 0, w: 1, h: 0.5 }, { x: 0, y: 0.5, w: 0.5, h: 0.5 }, { x: 0.5, y: 0.5, w: 0.5, h: 0.5 }] },
                { name: '上二下一', cols: 2, rows: 2, calc: () => [{ x: 0, y: 0, w: 0.5, h: 0.5 }, { x: 0.5, y: 0, w: 0.5, h: 0.5 }, { x: 0, y: 0.5, w: 1, h: 0.5 }] }
            ],
            4: [
                { name: '四宫格', cols: 2, rows: 2, calc: () => [{ x: 0, y: 0, w: 0.5, h: 0.5 }, { x: 0.5, y: 0, w: 0.5, h: 0.5 }, { x: 0, y: 0.5, w: 0.5, h: 0.5 }, { x: 0.5, y: 0.5, w: 0.5, h: 0.5 }] },
                { name: '横向长图', cols: 4, rows: 1, calc: n => Array(n).fill(0).map((_, k) => ({ x: k / n, y: 0, w: 1 / n, h: 1 })) },
                { name: '竖向长图', cols: 1, rows: 4, calc: n => Array(n).fill(0).map((_, k) => ({ x: 0, y: k / n, w: 1, h: 1 / n })) }
            ],
            5: [
                { name: '5图网格', cols: 3, rows: 2, calc: () => [{ x: 0, y: 0, w: 1 / 3, h: 1 / 2 }, { x: 1 / 3, y: 0, w: 1 / 3, h: 1 / 2 }, { x: 2 / 3, y: 0, w: 1 / 3, h: 1 / 2 }, { x: 0, y: 1 / 2, w: 1 / 3, h: 1 / 2 }, { x: 1 / 3, y: 1 / 2, w: 1 / 3, h: 1 / 2 }] },
                { name: '横向长图', cols: 5, rows: 1, calc: n => Array(n).fill(0).map((_, k) => ({ x: k / n, y: 0, w: 1 / n, h: 1 })) },
                { name: '竖向长图', cols: 1, rows: 5, calc: n => Array(n).fill(0).map((_, k) => ({ x: 0, y: k / n, w: 1, h: 1 / n })) }
            ],
            6: [
                { name: '6图网格', cols: 3, rows: 2, calc: () => [{ x: 0, y: 0, w: 1 / 3, h: 1 / 2 }, { x: 1 / 3, y: 0, w: 1 / 3, h: 1 / 2 }, { x: 2 / 3, y: 0, w: 1 / 3, h: 1 / 2 }, { x: 0, y: 1 / 2, w: 1 / 3, h: 1 / 2 }, { x: 1 / 3, y: 1 / 2, w: 1 / 3, h: 1 / 2 }, { x: 2 / 3, y: 1 / 2, w: 1 / 3, h: 1 / 2 }] },
                { name: '横向长图', cols: 6, rows: 1, calc: n => Array(n).fill(0).map((_, k) => ({ x: k / n, y: 0, w: 1 / n, h: 1 })) },
                { name: '竖向长图', cols: 1, rows: 6, calc: n => Array(n).fill(0).map((_, k) => ({ x: 0, y: k / n, w: 1, h: 1 / n })) }
            ],
            7: [
                { name: '7图网格', cols: 3, rows: 3, calc: () => [{ x: 0, y: 0, w: 1 / 3, h: 1 / 3 }, { x: 1 / 3, y: 0, w: 1 / 3, h: 1 / 3 }, { x: 2 / 3, y: 0, w: 1 / 3, h: 1 / 3 }, { x: 0, y: 1 / 3, w: 1 / 3, h: 1 / 3 }, { x: 1 / 3, y: 1 / 3, w: 1 / 3, h: 1 / 3 }, { x: 0, y: 2 / 3, w: 1 / 3, h: 1 / 3 }, { x: 1 / 3, y: 2 / 3, w: 1 / 3, h: 1 / 3 }] },
                { name: '横向长图', cols: 7, rows: 1, calc: n => Array(n).fill(0).map((_, k) => ({ x: k / n, y: 0, w: 1 / n, h: 1 })) },
                { name: '竖向长图', cols: 1, rows: 7, calc: n => Array(n).fill(0).map((_, k) => ({ x: 0, y: k / n, w: 1, h: 1 / n })) }
            ],
            8: [
                { name: '8图网格', cols: 4, rows: 2, calc: () => [{ x: 0, y: 0, w: 1 / 4, h: 1 / 2 }, { x: 1 / 4, y: 0, w: 1 / 4, h: 1 / 2 }, { x: 2 / 4, y: 0, w: 1 / 4, h: 1 / 2 }, { x: 3 / 4, y: 0, w: 1 / 4, h: 1 / 2 }, { x: 0, y: 1 / 2, w: 1 / 4, h: 1 / 2 }, { x: 1 / 4, y: 1 / 2, w: 1 / 4, h: 1 / 2 }, { x: 2 / 4, y: 1 / 2, w: 1 / 4, h: 1 / 2 }, { x: 3 / 4, y: 1 / 2, w: 1 / 4, h: 1 / 2 }] },
                { name: '横向长图', cols: 8, rows: 1, calc: n => Array(n).fill(0).map((_, k) => ({ x: k / n, y: 0, w: 1 / n, h: 1 })) },
                { name: '竖向长图', cols: 1, rows: 8, calc: n => Array(n).fill(0).map((_, k) => ({ x: 0, y: k / n, w: 1, h: 1 / n })) }
            ],
            9: [
                { name: '九宫格', cols: 3, rows: 3, calc: () => [{ x: 0, y: 0, w: 1 / 3, h: 1 / 3 }, { x: 1 / 3, y: 0, w: 1 / 3, h: 1 / 3 }, { x: 2 / 3, y: 0, w: 1 / 3, h: 1 / 3 }, { x: 0, y: 1 / 3, w: 1 / 3, h: 1 / 3 }, { x: 1 / 3, y: 1 / 3, w: 1 / 3, h: 1 / 3 }, { x: 2 / 3, y: 1 / 3, w: 1 / 3, h: 1 / 3 }, { x: 0, y: 2 / 3, w: 1 / 3, h: 1 / 3 }, { x: 1 / 3, y: 2 / 3, w: 1 / 3, h: 1 / 3 }, { x: 2 / 3, y: 2 / 3, w: 1 / 3, h: 1 / 3 }] },
                { name: '横向长图', cols: 9, rows: 1, calc: n => Array(n).fill(0).map((_, k) => ({ x: k / n, y: 0, w: 1 / n, h: 1 })) },
                { name: '竖向长图', cols: 1, rows: 9, calc: n => Array(n).fill(0).map((_, k) => ({ x: 0, y: k / n, w: 1, h: 1 / n })) }
            ]
        };

        function renderLayouts() {
            const count = stitchImages.length;
            layoutSelector.innerHTML = '';
            if (count < 1) { layoutSelector.textContent = '请先上传图片'; currentLayout = null; return; }
            const key = Math.min(count, 9);
            const layouts = layoutTemplates[key] || layoutTemplates[4];
            layouts.forEach((layout, idx) => {
                const opt = document.createElement('div');
                opt.className = 'layout-option ' + (idx === 0 ? 'active' : '');
                const prev = document.createElement('div');
                prev.className = 'layout-preview';
                prev.style.gridTemplateColumns = 'repeat(' + layout.cols + ', 1fr)';
                prev.style.gridTemplateRows = 'repeat(' + layout.rows + ', 1fr)';
                for (let i = 0; i < count; i++) { const dot = document.createElement('div'); prev.appendChild(dot); }
                opt.appendChild(prev);
                opt.onclick = () => {
                    document.querySelectorAll('.layout-option').forEach(e => e.classList.remove('active'));
                    opt.classList.add('active');
                    currentLayout = layout;
                };
                layoutSelector.appendChild(opt);
            });
            currentLayout = layouts[0];
        }

        function updateFitModeGroup() {
            const w = parseInt(outWidthEl.value) || 0;
            const h = parseInt(outHeightEl.value) || 0;
            fitModeGroup.style.display = (w > 0 && h > 0) ? 'flex' : 'none';
        }
        outWidthEl.addEventListener('input', updateFitModeGroup);
        outHeightEl.addEventListener('input', updateFitModeGroup);

        fitModeBtns.forEach(btn => {
            btn.onclick = () => {
                const mode = btn.dataset.mode;
                if (fitMode === mode) {
                    fitMode = 'none';
                    btn.classList.remove('active');
                } else {
                    fitMode = mode;
                    fitModeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                }
            };
        });

        stitchUploadArea.onclick = () => { stitchFileInput.value = ''; stitchFileInput.click(); };
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => { stitchUploadArea.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }); });
        stitchUploadArea.ondrop = e => {
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            if (files.length) addStitchImages(files);
        };
        stitchFileInput.onchange = e => addStitchImages(Array.from(e.target.files));

        function addStitchImages(files) {
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    stitchImages.push({ id: Math.random(), url: e.target.result });
                    updateStitchPreview();
                    renderLayouts();
                };
                reader.readAsDataURL(file);
            });
        }

        function updateStitchPreview() {
            if (stitchImages.length === 0) {
                stitchPreviewList.innerHTML = '<p style="width:100%;text-align:center;color:#888">暂无图片</p>';
                return;
            }
            stitchPreviewList.innerHTML = '';
            stitchImages.forEach(img => {
                const item = document.createElement('div');
                item.className = 'stitch-preview-item';
                item.innerHTML = '<img src="' + img.url + '"><div class="remove-btn" data-id="' + img.id + '">×</div>';
                stitchPreviewList.appendChild(item);
            });
        }

        stitchPreviewList.onclick = e => {
            if (e.target.classList.contains('remove-btn')) {
                const id = parseFloat(e.target.dataset.id);
                stitchImages = stitchImages.filter(i => i.id !== id);
                updateStitchPreview();
                renderLayouts();
            }
        };

        stitchBtn.onclick = async () => {
            if (stitchImages.length < 1) return alert('至少上传1张图片');
            if (!currentLayout) return alert('请选择布局');
            stitchResultBox.style.display = 'none';
            stitchedImage.style.display = 'none';
            stitchDownloadBtn.style.display = 'none';

            try {
                const imgs = await Promise.all(stitchImages.map(i => loadImg(i.url)));
                const n = imgs.length;
                const cells = currentLayout.calc(n);
                const targetW = parseInt(outWidthEl.value) || 0;
                const targetH = parseInt(outHeightEl.value) || 0;
                const useCustom = targetW > 0 && targetH > 0;

                const canvas2 = document.createElement('canvas');
                const maxW = Math.max(...imgs.map(i => i.width));
                const maxH = Math.max(...imgs.map(i => i.height));

                if (useCustom) {
                    canvas2.width = targetW;
                    canvas2.height = targetH;
                } else {
                    if (layoutIsHorizontal(currentLayout)) {
                        canvas2.width = imgs.reduce((s, i) => s + i.width, 0);
                        canvas2.height = maxH;
                    } else if (layoutIsVertical(currentLayout)) {
                        canvas2.width = maxW;
                        canvas2.height = imgs.reduce((s, i) => s + i.height, 0);
                    } else {
                        canvas2.width = maxW * 3;
                        canvas2.height = maxH * 3;
                    }
                }

                const ctx3 = canvas2.getContext('2d');
                ctx3.fillStyle = '#fff';
                ctx3.fillRect(0, 0, canvas2.width, canvas2.height);
                const CW = canvas2.width, CH = canvas2.height;

                imgs.forEach((img, i) => {
                    const cell = cells[i];
                    const x = cell.x * CW;
                    const y = cell.y * CH;
                    const w = cell.w * CW;
                    const h = cell.h * CH;

                    if (fitMode === 'stretch') {
                        ctx3.drawImage(img, x, y, w, h);
                    } else if (fitMode === 'cover') {
                        const ratio = Math.max(w / img.width, h / img.height);
                        const iw = img.width * ratio;
                        const ih = img.height * ratio;
                        const ix = x + (w - iw) / 2;
                        const iy = y + (h - ih) / 2;
                        ctx3.drawImage(img, ix, iy, iw, ih);
                    } else {
                        const ratio = Math.min(w / img.width, h / img.height);
                        const iw = img.width * ratio;
                        const ih = img.height * ratio;
                        const ix = x + (w - iw) / 2;
                        const iy = y + (h - ih) / 2;
                        ctx3.drawImage(img, ix, iy, iw, ih);
                    }
                });

                const fmt = stitchOutputFormat.value.toLowerCase();
                if (fmt === 'pdf') {
                    const { jsPDF } = jspdf;
                    const pdf = new jsPDF({
                        orientation: CW > CH ? 'landscape' : 'portrait',
                        unit: 'px',
                        format: [CW, CH]
                    });
                    pdf.addImage(canvas2.toDataURL('image/png'), 'PNG', 0, 0, CW, CH);
                    stitchedUrl = pdf.output('bloburl');
                    stitchResultBox.innerHTML = '<h3>PDF 拼接完成</h3><p>请下载查看</p>';
                } else {
                    stitchedUrl = canvas2.toDataURL('image/' + fmt, 0.95);
                    stitchedImage.src = stitchedUrl;
                    stitchedImage.style.display = 'block';
                }
                stitchResultBox.style.display = 'block';
                stitchDownloadBtn.style.display = 'inline-block';
            } catch (e) {
                alert('拼接失败：' + e.message);
            }
        };

        function layoutIsHorizontal(layout) { return layout.rows === 1; }
        function layoutIsVertical(layout) { return layout.cols === 1; }

        stitchDownloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = stitchedUrl;
            a.download = '拼接结果-图片拼接.' + stitchOutputFormat.value;
            a.click();
        };

        function loadImg(url) {
            return new Promise((res, rej) => {
                const i = new Image();
                i.onload = () => res(i);
                i.onerror = rej;
                i.src = url;
            });
        }

        renderLayouts();
        updateFitModeGroup();
    </script>
</body>
</html>
