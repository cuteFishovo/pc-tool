<body>
    <script>
        (function(){var u=navigator.userAgent||navigator.vendor||window.opera;var m=/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|webOS/i.test(u);var t=/iPad|Android(?!.*Mobile)|Tablet|PlayBook|Silk/i.test(u)||(/(?:Macintosh|Windows)/i.test(u)&&'ontouchend' in document&&window.innerWidth<=1024);if((m||t)&&window.location.pathname.indexOf('mobile.html')===-1)window.location.replace('../mobile.html');})();

    <canvas id="bg-canvas" class="bg-canvas"></canvas>

    <div class="container">
        <h1>音频截取</h1>
        <p>设定起止时间，裁剪音频片段</p>

        <div class="upload-area" id="uploadArea">
            <p>点击或拖拽上传音频</p>
            <input type="file" id="audioInput" accept="audio/*">
        </div>

        <div id="audioInfo" style="text-align:center; margin:10px 0; display:none;">
            <p id="fileName" style="color:#e4e4e7;"></p>
            <p id="durationInfo" style="color:#71717a; font-size:13px;"></p>
        </div>

        <div class="time-row">
            <label>开始时间:</label>
            <input type="text" id="startTime" value="00:00" placeholder="MM:SS">
            <label style="margin-left:10px;">结束时间:</label>
            <input type="text" id="endTime" value="00:10" placeholder="MM:SS">
        </div>
        <p class="time-tip">格式：分:秒 或 秒数，如 01:30 或 90</p>

        <div style="text-align:center;">
            <select class="format-select" id="outputFormat">
                <option value="wav">WAV 格式</option>
                <option value="mp3">MP3 格式</option>
            </select>
            <button class="convert-btn" id="clipBtn">开始截取</button>
            <button class="download-btn" id="downloadBtn">下载片段</button>
        </div>

        <div class="result-box" id="resultBox">
            <h3>截取完成</h3>
            <div class="size-info" id="sizeInfo"></div>
            <audio id="audioPreview" controls style="width:100%; margin-top:10px;"></audio>
        </div>

        <div class="contact-tip">面向大众，有任何想要的功能或者意见，请联系QQ：<strong>1003294905</strong></div>
    </div>

    <script src="common.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const audioInput = document.getElementById('audioInput');
        const clipBtn = document.getElementById('clipBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resultBox = document.getElementById('resultBox');
        const sizeInfo = document.getElementById('sizeInfo');
        const audioInfo = document.getElementById('audioInfo');
        const fileName = document.getElementById('fileName');
        const durationInfo = document.getElementById('durationInfo');
        const audioPreview = document.getElementById('audioPreview');
        const startTime = document.getElementById('startTime');
        const endTime = document.getElementById('endTime');
        const outputFormat = document.getElementById('outputFormat');

        let audioFile = null, audioUrl = null, audioBuffer = null, sourceAudioUrl = null;

        uploadArea.onclick = () => audioInput.click();
        setupDragDrop(uploadArea, (files) => {
            if (files[0]?.type.startsWith('audio/') || /\.(mp3|wav|ogg|m4a|flac|aac)$/i.test(files[0].name)) handleAudio(files[0]);
            else showToast('请上传音频文件');
        });

        audioInput.onchange = (e) => handleAudio(e.target.files[0]);

        async function handleAudio(f) {
            audioFile = f;
            fileName.textContent = '文件名：' + f.name + ' (' + formatSize(f.size) + ')';
            audioInfo.style.display = 'block';
            resultBox.style.display = 'none';
            downloadBtn.style.display = 'none';

            if (sourceAudioUrl) URL.revokeObjectURL(sourceAudioUrl);
            sourceAudioUrl = URL.createObjectURL(f);

            try {
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const ab = await f.arrayBuffer();
                audioBuffer = await actx.decodeAudioData(ab);
                const d = audioBuffer.duration;
                const mins = Math.floor(d / 60);
                const secs = Math.floor(d % 60);
                durationInfo.textContent = '音频时长：' + mins + '分' + secs + '秒 (总' + d.toFixed(1) + 's)';
                actx.close();
            } catch(e) {
                durationInfo.textContent = '无法获取时长';
            }
        }

        function parseTime(str) {
            str = str.trim();
            if (str.includes(':')) {
                const parts = str.split(':');
                return parseInt(parts[0]) * 60 + parseFloat(parts[1]);
            }
            return parseFloat(str);
        }

        clipBtn.onclick = async () => {
            if (!audioFile || !audioBuffer) { showToast('请先上传音频'); return; }

            const start = parseTime(startTime.value);
            const end = parseTime(endTime.value);
            if (isNaN(start) || isNaN(end)) { showToast('请输入有效的时间'); return; }
            if (start >= end) { showToast('开始时间必须小于结束时间'); return; }
            if (end > audioBuffer.duration) { showToast('结束时间超出音频时长'); return; }

            clipBtn.disabled = true;
            clipBtn.textContent = '截取中...';

            try {
                const sampleRate = audioBuffer.sampleRate;
                const channels = audioBuffer.numberOfChannels;
                const startSample = Math.floor(start * sampleRate);
                const endSample = Math.floor(end * sampleRate);
                const length = endSample - startSample;

                const offlineCtx = new OfflineAudioContext(channels, length, sampleRate);
                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;

                const gain = offlineCtx.createGain();
                gain.gain.value = 1;
                source.connect(gain);
                gain.connect(offlineCtx.destination);

                source.start(0, start, end - start);
                const renderedBuffer = await offlineCtx.startRendering();

                let blob;
                const fmt = outputFormat.value;
                if (fmt === 'wav') {
                    blob = audioBufferToBlob(renderedBuffer);
                } else {
                    // Encode as MP3 via MediaRecorder
                    blob = await encodeMP3(renderedBuffer);
                }

                if (audioUrl) URL.revokeObjectURL(audioUrl);
                audioUrl = URL.createObjectURL(blob);

                sizeInfo.innerHTML = '原始音频：' + formatSize(audioFile.size) + '<br>截取片段：<span class="highlight">' + formatSize(blob.size) + '</span><br>时长：<span class="highlight">' + (end - start).toFixed(1) + 's</span>';
                audioPreview.src = audioUrl;
                resultBox.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
            } catch (e) {
                showToast('截取失败：' + e.message);
            } finally {
                clipBtn.disabled = false;
                clipBtn.textContent = '开始截取';
            }
        };

        function audioBufferToBlob(buffer) {
            const numChannels = buffer.numberOfChannels;
            const length = buffer.length;
            const sampleRate = buffer.sampleRate;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * bitsPerSample / 8;
            const blockAlign = numChannels * bitsPerSample / 8;
            const dataSize = length * numChannels * bitsPerSample / 8;
            const headerSize = 44;
            const totalSize = headerSize + dataSize;
            const arrayBuffer = new ArrayBuffer(totalSize);
            const view = new DataView(arrayBuffer);

            function writeString(offset, str) {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            }

            writeString(0, 'RIFF');
            view.setUint32(4, totalSize - 8, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);

            let offset = 44;
            for (let i = 0; i < length; i++) {
                for (let ch = 0; ch < numChannels; ch++) {
                    const sample = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
                    view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                    offset += 2;
                }
            }
            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }

        async function encodeMP3(buffer) {
            // 使用 lamejs 编码 WAV → MP3
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const length = buffer.length;

            const mp3encoder = new lamejs.Mp3Encoder(numChannels, sampleRate, 128);
            const mp3Data = [];

            const blockSize = 1152;
            const left = new Int16Array(length);
            for (let i = 0; i < length; i++) {
                const sample = Math.max(-1, Math.min(1, buffer.getChannelData(0)[i]));
                left[i] = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
            }

            if (numChannels === 1) {
                for (let i = 0; i < length; i += blockSize) {
                    const chunk = left.subarray(i, i + blockSize);
                    const mp3buf = mp3encoder.encodeBuffer(chunk);
                    if (mp3buf.length > 0) mp3Data.push(mp3buf);
                }
            } else {
                const right = new Int16Array(length);
                for (let i = 0; i < length; i++) {
                    const sample = Math.max(-1, Math.min(1, buffer.getChannelData(1)[i]));
                    right[i] = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                }
                for (let i = 0; i < length; i += blockSize) {
                    const chunkL = left.subarray(i, i + blockSize);
                    const chunkR = right.subarray(i, i + blockSize);
                    const mp3buf = mp3encoder.encodeBuffer(chunkL, chunkR);
                    if (mp3buf.length > 0) mp3Data.push(mp3buf);
                }
            }

            const finalBuf = mp3encoder.flush();
            if (finalBuf.length > 0) mp3Data.push(finalBuf);

            return new Blob(mp3Data, { type: 'audio/mp3' });
        }

        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = audioUrl;
            const ext = outputFormat.value;
            a.download = (audioFile?.name || 'audio').replace(/\.\w+$/, '') + '-剪辑.' + ext;
            a.click();
        };
    </script>
</body>
