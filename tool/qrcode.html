    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script>
    // ==================== 二维码生成器 ====================
    function renderQRToCanvas(isDark, count, fg, bg, size) {
        var canvas = document.createElement('canvas');
        var margin = 4;
        var totalSize = size || 300;
        var moduleSize = Math.max(1, Math.floor(totalSize / (count + margin * 2)));
        canvas.width = (count + margin * 2) * moduleSize;
        canvas.height = (count + margin * 2) * moduleSize;
        var ctx = canvas.getContext('2d');

        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = fg;
        var darkCount = 0;
        for (var r = 0; r < count; r++) {
            for (var c = 0; c < count; c++) {
                if (isDark(r, c)) {
                    darkCount++;
                    ctx.fillRect((c + margin) * moduleSize, (r + margin) * moduleSize, moduleSize, moduleSize);
                }
            }
        }

        return {
            canvas: canvas,
            dataURL: canvas.toDataURL('image/png'),
            darkCount: darkCount
        };
    }

    function generateOnlineQR(text, fg, bg, size) {
        var qr = qrcode(0, 'M');
        qr.addData(text, 'Byte');
        qr.make();
        return renderQRToCanvas(function (r, c) {
            return qr.isDark(r, c);
        }, qr.getModuleCount(), fg, bg, size);
    }

    function generateLocalQR(text, fg, bg, size) {
        var url = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&ecc=M&margin=10&format=png&data=' + encodeURIComponent(text);
        var img = new Image();
        img.crossOrigin = 'anonymous';

        return new Promise(function (resolve, reject) {
            img.onload = function () {
                var canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                var ctx = canvas.getContext('2d');
                ctx.fillStyle = bg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);

                if (fg.toLowerCase() !== '#000000' || bg.toLowerCase() !== '#ffffff') {
                    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    var data = imageData.data;
                    var fgRgb = hexToRgb(fg);
                    var bgRgb = hexToRgb(bg);
                    for (var i = 0; i < data.length; i += 4) {
                        var isDark = data[i] < 128 && data[i + 1] < 128 && data[i + 2] < 128;
                        var color = isDark ? fgRgb : bgRgb;
                        data[i] = color.r;
                        data[i + 1] = color.g;
                        data[i + 2] = color.b;
                    }
                    ctx.putImageData(imageData, 0, 0);
                }

                resolve({
                    canvas: canvas,
                    dataURL: canvas.toDataURL('image/png'),
                    darkCount: 1
                });
            };
            img.onerror = function () {
                reject(new Error('在线二维码服务加载失败'));
            };
            img.src = url;
        });
    }

    function hexToRgb(hex) {
        return {
            r: parseInt(hex.slice(1, 3), 16),
            g: parseInt(hex.slice(3, 5), 16),
            b: parseInt(hex.slice(5, 7), 16)
        };
    }

    // ==================== 界面逻辑 ====================
    var qrInput = document.getElementById('qr-input');
    var fgColor = document.getElementById('fg-color');
    var bgColor = document.getElementById('bg-color');
    var qrContainer = document.getElementById('qr-container');
    var placeholderEl = document.getElementById('qr-placeholder');
    var downloadBtn = document.getElementById('download-btn');
    var actionBtns = document.getElementById('action-btns');
    var modeInputs = document.querySelectorAll('input[name="qr-mode"]');
    var logoInput = document.getElementById('logo-input');
    var logoPreview = document.getElementById('logo-preview');
    var logoClear = document.getElementById('logo-clear');
    var logoLabel = document.getElementById('logo-label-text');
    var logoImage = null;
    var currentCanvas = null;
    var currentImg = null;
    var debounceTimer;

    function getSelectedMode() {
        for (var i = 0; i < modeInputs.length; i++) {
            if (modeInputs[i].checked) return modeInputs[i].value;
        }
        return 'online';
    }

    function renderResult(result) {
        var canvas = result.canvas;
        var dataURL = result.dataURL;

        if (currentImg) { currentImg.remove(); currentImg = null; }
        if (currentCanvas) { currentCanvas.remove(); currentCanvas = null; }

        var img = document.createElement('img');
        img.id = 'qrcode-img';
        img.src = dataURL;
        img.alt = 'QR Code';
        img.style.cssText = 'display:block;max-width:100%;height:auto;border-radius:8px;background:#fff;padding:12px;box-sizing:border-box;';

        placeholderEl.style.display = 'none';
        qrContainer.appendChild(img);
        currentImg = img;
        currentCanvas = canvas;
        actionBtns.style.display = 'flex';

        if (logoImage && result.darkCount > 0) {
            drawLogo(canvas);
            img.src = canvas.toDataURL('image/png');
        }
    }

    function generateQR() {
        var text = qrInput.value.trim();
        if (!text) {
            clearQR();
            return;
        }

        var mode = getSelectedMode();
        try {
            if (mode === 'local') {
                generateLocalQR(text, fgColor.value, bgColor.value, 300)
                    .then(renderResult)
                    .catch(function (e) {
                        console.error(e);
                        showToast('生成二维码失败：' + e.message);
                    });
                return;
            }

            renderResult(generateOnlineQR(text, fgColor.value, bgColor.value, 300));
        } catch (e) {
            console.error(e);
            showToast('生成二维码失败：' + e.message);
        }
    }

    function clearQR() {
        if (currentImg) { currentImg.remove(); currentImg = null; }
        if (currentCanvas) { currentCanvas.remove(); currentCanvas = null; }
        placeholderEl.style.display = 'block';
        actionBtns.style.display = 'none';
    }

    function drawLogo(canvas) {
        var ctx = canvas.getContext('2d');
        var size = canvas.width;
        var logoSize = size * 0.22;
        var x = (size - logoSize) / 2;
        var y = (size - logoSize) / 2;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x - 3, y - 3, logoSize + 6, logoSize + 6);
        var radius = 4;
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + logoSize - radius, y);
        ctx.quadraticCurveTo(x + logoSize, y, x + logoSize, y + radius);
        ctx.lineTo(x + logoSize, y + logoSize - radius);
        ctx.quadraticCurveTo(x + logoSize, y + logoSize, x + logoSize - radius, y + logoSize);
        ctx.lineTo(x + radius, y + logoSize);
        ctx.quadraticCurveTo(x, y + logoSize, x, y + logoSize - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(logoImage, x, y, logoSize, logoSize);
    }

    qrInput.addEventListener('input', function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(generateQR, 300);
    });
    fgColor.addEventListener('input', generateQR);
    bgColor.addEventListener('input', generateQR);
    for (var i = 0; i < modeInputs.length; i++) {
        modeInputs[i].addEventListener('change', generateQR);
    }

    logoInput.addEventListener('change', function (e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
            var img = new Image();
            img.onload = function () {
                logoImage = img;
                logoPreview.innerHTML = '<img src="' + ev.target.result + '" alt="Logo">';
                logoClear.style.display = 'inline-block';
                logoLabel.textContent = '已选择Logo';
                generateQR();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    logoClear.addEventListener('click', function (e) {
        e.stopPropagation(); e.preventDefault();
        logoImage = null; logoInput.value = '';
        logoPreview.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
        logoClear.style.display = 'none';
        logoLabel.textContent = '点击上传Logo图片';
        generateQR();
    });

    downloadBtn.addEventListener('click', function () {
        if (!currentCanvas) return;
        var link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = currentCanvas.toDataURL('image/png');
        link.click();
    });
    </script>
