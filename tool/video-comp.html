    <script src="common.js"></script>

    <script>
        (() => {
            const uploadArea  = document.getElementById('videoUploadArea');
            const fileInput   = document.getElementById('videoFileInput');
            const compressBtn = document.getElementById('videoCompressBtn');
            const downloadBtn = document.getElementById('videoDownloadBtn');
            const resetBtn    = document.getElementById('videoResetBtn');
            const formatSel   = document.getElementById('videoOutputFormat');
            const qualitySlider = document.getElementById('qualitySlider');
            const qualityBadge = document.getElementById('qualityBadge');
            const resolutionSel = document.getElementById('resolutionSelect');
            const resultBox   = document.getElementById('videoResultBox');
            const progressWrap = document.getElementById('progressWrap');
            const progressBar  = document.getElementById('progressBarFill');
            const progressText = document.getElementById('progressText');
            const videoPreview = document.getElementById('videoPreview');
            const fileInfoDiv  = document.getElementById('fileInfo');

            let videoFile = null, compressedBlob = null, compressedUrl = null;
            let videoWidth = 0, videoHeight = 0, videoDuration = 0;

            /* ---- Quality badge ---- */
            const qualityLabels = { 1: '低画质', 2: '中等', 3: '高画质' };
            const qualityClasses = { 1: 'low', 2: 'medium', 3: 'high' };

            qualitySlider.addEventListener('input', () => {
                const v = qualitySlider.value;
                qualityBadge.textContent = qualityLabels[v];
                qualityBadge.className = 'quality-badge ' + qualityClasses[v];
            });

            /* ---- File selection ---- */
            uploadArea.onclick = (e) => {
                if (videoFile) return; // 已有文件，让视频控件自由响应
                fileInput.click();
            };
            ['dragenter','dragover','dragleave','drop'].forEach(evt =>
                uploadArea.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); })
            );
            ['dragenter','dragover'].forEach(evt =>
                uploadArea.addEventListener(evt, () => { if (!videoFile) uploadArea.style.background = 'rgba(129,140,248,0.1)'; })
            );
            ['dragleave','drop'].forEach(evt =>
                uploadArea.addEventListener(evt, () => { if (!videoFile) uploadArea.style.background = ''; })
            );

            uploadArea.ondrop = (e) => {
                const f = e.dataTransfer.files[0];
                if (f && f.type.startsWith('video/')) handleVideo(f);
                else alert('请上传视频文件');
                uploadArea.style.background = '';
            };
            fileInput.onchange = (e) => {
                const f = e.target.files[0];
                if (f) handleVideo(f);
            };

            function formatSize(bytes) {
                if (!bytes) return '-';
                const units = ['B', 'KB', 'MB', 'GB'];
                let i = 0;
                let s = bytes;
                while (s >= 1024 && i < units.length - 1) { s /= 1024; i++; }
                return s.toFixed(i > 0 ? 2 : 0) + ' ' + units[i];
            }

            function formatDuration(sec) {
                if (!sec) return '-';
                const m = Math.floor(sec / 60);
                const s = Math.floor(sec % 60);
                return m + '分' + s.toString().padStart(2,'0') + '秒';
            }

            function handleVideo(file) {
                videoFile = file;
                compressedBlob = null;
                if (compressedUrl) { URL.revokeObjectURL(compressedUrl); compressedUrl = null; }

                const url = URL.createObjectURL(file);
                videoPreview.src = url;

                function onMeta() {
                    videoWidth = videoPreview.videoWidth;
                    videoHeight = videoPreview.videoHeight;
                    videoDuration = videoPreview.duration;

                    document.getElementById('infoName').textContent = file.name;
                    document.getElementById('infoSize').textContent = formatSize(file.size);
                    document.getElementById('infoRes').textContent = videoWidth + ' x ' + videoHeight;
                    document.getElementById('infoDuration').textContent = formatDuration(videoDuration);

                    uploadArea.classList.add('has-file');
                    compressBtn.disabled = false;
                    resetBtn.style.display = 'inline-block';
                    downloadBtn.classList.remove('visible');
                    resultBox.style.display = 'none';
                    progressWrap.classList.remove('active');

                    const h = videoHeight;
                    if (h >= 2160) resolutionSel.value = '2160';
                    else if (h >= 1440) resolutionSel.value = '1440';
                    else if (h >= 1080) resolutionSel.value = '1080';
                    else if (h >= 720) resolutionSel.value = '720';
                    else resolutionSel.value = 'original';

                    // 检测原始音频信息
                    try {
                        const at = videoPreview.captureStream().getAudioTracks();
                        if (at.length > 0) {
                            const s = at[0].getSettings();
                            const ch = s.channelCount || 2;
                            const sr = s.sampleRate || 44100;
                            document.getElementById('infoAudio').textContent =
                                (ch === 1 ? '单声道' : ch === 2 ? '立体声' : ch + '声道') +
                                ' / ' + (sr / 1000).toFixed(1) + 'kHz';
                        } else {
                            document.getElementById('infoAudio').textContent = '无音频';
                        }
                    } catch (e) {
                        document.getElementById('infoAudio').textContent = '检测失败';
                    }
                }

                // 元数据可能已缓存，readyState>=1 时 loadedmetadata 不会再次触发
                if (videoPreview.readyState >= 1) {
                    onMeta();
                } else {
                    videoPreview.onloadedmetadata = onMeta;
                }
            }

            /* ---- Reset ---- */
            resetBtn.onclick = () => {
                videoFile = null;
                compressedBlob = null;
                if (compressedUrl) { URL.revokeObjectURL(compressedUrl); compressedUrl = null; }
                videoPreview.src = '';
                fileInput.value = '';
                uploadArea.classList.remove('has-file');
                compressBtn.disabled = true;
                resetBtn.style.display = 'none';
                downloadBtn.classList.remove('visible');
                resultBox.style.display = 'none';
                progressWrap.classList.remove('active');
                progressBar.style.width = '0%';
                progressText.textContent = '准备中...';
            };

            /* ---- Compress (MediaRecorder + Canvas，零依赖，兼容 file://) ---- */
            compressBtn.onclick = async () => {
                if (!videoFile) { alert('请先上传视频'); return; }

                let recorder, tracks;
                try {
                    compressBtn.disabled = true;
                    compressBtn.classList.add('compressing');
                    compressBtn.innerHTML = '<span class="spinner"></span> 压缩中...';
                    downloadBtn.classList.remove('visible');
                    resultBox.style.display = 'none';
                    progressWrap.classList.add('active');
                    progressBar.style.width = '10%';
                    progressText.textContent = '正在预加载视频...';

                    const outFmt = formatSel.value;
                    const quality = parseInt(qualitySlider.value); // 1=low 2=med 3=high
                    const resolution = resolutionSel.value;

                    // 离屏 video
                    const v = document.createElement('video');
                    v.src = URL.createObjectURL(videoFile);
                    v.preload = 'auto';
                    v.playsInline = true;
                    v.muted = true;
                    await new Promise((res, rej) => {
                        v.onloadedmetadata = res;
                        v.onerror = () => rej(new Error('视频加载失败'));
                    });

                    const srcW = v.videoWidth, srcH = v.videoHeight;
                    let dstW = srcW, dstH = srcH;
                    if (resolution !== 'original') {
                        const targetH = parseInt(resolution);
                        const ratio = srcW / srcH;
                        dstH = Math.min(srcH, targetH);
                        dstW = Math.round(dstH * ratio);
                    }

                    const fps = 24;
                    progressBar.style.width = '20%';
                    progressText.textContent = '准备编码 (分辨率 ' + dstW + 'x' + dstH + ')...';

                    // Canvas 视频轨道
                    const canvas = document.createElement('canvas');
                    canvas.width = dstW;
                    canvas.height = dstH;
                    const ctx = canvas.getContext('2d');
                    const canvasVideoStream = canvas.captureStream(fps);

                    // 音频轨道：直接从 video.captureStream() 拿原始音轨，可靠无 AudioContext 坑
                    const origCapStream = v.captureStream();
                    const origAudioTracks = origCapStream.getAudioTracks();

                    const tracksArr = [];
                    canvasVideoStream.getVideoTracks().forEach(t => tracksArr.push(t));
                    origAudioTracks.forEach(t => tracksArr.push(t));
                    const combined = new MediaStream(tracksArr);
                    tracks = tracksArr;

                    // 音频码率
                    const audioQuality = parseInt(document.getElementById('audioQualitySelect').value);
                    const audioBitrateMap = { 1: 64000, 2: 128000, 3: 192000 };

                    // bits per pixel: 低画质激进压缩
                    const bppMap = { 1: 0.02, 2: 0.06, 3: 0.14 };
                    const targetBitrate = Math.round(dstW * dstH * bppMap[quality] * fps);

                    // MediaRecorder 配置
                    const recorderOpts = {
                        mimeType: MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
                            ? 'video/webm;codecs=vp9'
                            : MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
                                ? 'video/webm;codecs=vp8'
                                : 'video/webm',
                        videoBitsPerSecond: Math.max(50000, Math.round(targetBitrate))
                    };
                    if (audioQuality > 0) {
                        recorderOpts.audioBitsPerSecond = audioBitrateMap[audioQuality];
                    }

                    recorder = new MediaRecorder(combined, recorderOpts);

                    const chunks = [];
                    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

                    const totalDuration = v.duration || 60;
                    const startTime = Date.now();

                    recorder.onstop = () => {
                        const outMime = outFmt === 'mp4' ? 'video/mp4' : recorderOpts.mimeType;
                        compressedBlob = new Blob(chunks, { type: outMime });
                        if (compressedUrl) URL.revokeObjectURL(compressedUrl);
                        compressedUrl = URL.createObjectURL(compressedBlob);

                        const savingPct = videoFile.size > 0
                            ? Math.round((1 - compressedBlob.size / videoFile.size) * 100)
                            : 0;

                        document.getElementById('resultOriginal').textContent = formatSize(videoFile.size);
                        document.getElementById('resultCompressed').textContent = formatSize(compressedBlob.size);
                        if (savingPct > 0) {
                            document.getElementById('resultSaving').textContent = '节省了 ' + savingPct + '% 的空间';
                        } else if (savingPct < 0) {
                            document.getElementById('resultSaving').textContent = '注意：压缩后反而增大了 ' + Math.abs(savingPct) + '%（源文件已高度优化，建议保持原始画质）';
                        } else {
                            document.getElementById('resultSaving').textContent = '文件大小基本不变';
                        }

                        resultBox.style.display = 'block';
                        downloadBtn.classList.add('visible');
                        progressText.textContent = '压缩完成！';
                        progressBar.style.width = '100%';
                        compressBtn.disabled = false;
                        compressBtn.classList.remove('compressing');
                        compressBtn.innerHTML = '开始压缩';

                        tracksArr.forEach(t => t.stop());
                    };

                    // 帧绘制循环
                    let stopped = false;
                    function drawLoop() {
                        if (stopped) return;
                        if (v.readyState >= 2) {
                            ctx.drawImage(v, 0, 0, dstW, dstH);
                        }
                        const elapsed = (Date.now() - startTime) / 1000;
                        const pct = Math.min(95, 20 + Math.round((elapsed / totalDuration) * 75));
                        progressBar.style.width = pct + '%';
                        const remain = Math.max(0, Math.round(totalDuration - elapsed));
                        progressText.textContent = '压缩中... ' + pct + '% (剩余约 ' + remain + '秒)';
                        if (elapsed < totalDuration) {
                            requestAnimationFrame(drawLoop);
                        }
                    }

                    recorder.start(250);
                    await v.play();
                    drawLoop();

                    // 等待实际播放完成
                    await new Promise(res => {
                        v.onended = res;
                        v.ontimeupdate = () => {
                            if (v.currentTime >= totalDuration - 0.1) res();
                        };
                        setTimeout(() => res(), totalDuration * 1000 + 2000);
                    });
                    stopped = true;

                    if (recorder.state === 'recording') {
                        recorder.stop();
                        v.pause();
                    }

                } catch (err) {
                    console.error(err);
                    const msg = err.message || String(err);
                    alert('压缩失败：' + msg);
                    progressText.textContent = '压缩失败：' + msg;
                    compressBtn.disabled = false;
                    compressBtn.classList.remove('compressing');
                    compressBtn.innerHTML = '开始压缩';
                    if (recorder && recorder.state === 'recording') recorder.stop();
                    if (tracks) tracks.forEach(t => { try { t.stop(); } catch(e) {} });
                }
            };

            /* ---- Download ---- */
            downloadBtn.onclick = () => {
                if (!compressedUrl) { alert('请先压缩视频'); return; }
                const ext = formatSel.value === 'mp4' ? 'mp4' : 'webm';
                const baseName = videoFile ? videoFile.name.replace(/\.[^.]+$/, '') : 'video';
                const a = document.createElement('a');
                a.href = compressedUrl;
                a.download = baseName + '-视频压缩.' + ext;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
        })();
    </script>
</body>
</html>
