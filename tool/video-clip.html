    <style>
        #videoInput { display: none; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            margin: 15px 0;

        .progress-bar .fill {

            border-radius: 3px;
            width: 0%;

        }

            display: flex;

<body>

    <canvas id="bg-canvas" class="bg-canvas"></canvas>

    <div class="container">
        <h1>视频截取片段</h1>
        <p>设定起止时间，截取视频片段导出</p>

        <div class="upload-area" id="uploadArea">
            <p>点击或拖拽上传视频</p>

        </div>

        <div class="time-row">
            <label>开始时间:</label>
            <input type="text" id="startTime" value="00:00" placeholder="MM:SS">
            <label style="margin-left:10px;">结束时间:</label>
            <input type="text" id="endTime" value="00:05" placeholder="MM:SS">
        </div>
        <p class="time-tip">格式：分:秒 或 秒数，如 01:30 或 90</p>

        <video id="previewVideo" controls></video>

        </div>

        <div style="text-align:center;">
            <button class="convert-btn" id="clipBtn">开始截取</button>
            <button class="download-btn" id="downloadBtn">下载片段</button>
        </div>

        <div class="result-box" id="resultBox">
            <h3>截取完成</h3>
            <div class="size-info" id="sizeInfo"></div>
        </div>

        <div class="contact-tip">面向大众，有任何想要的功能或者意见，请联系QQ：<strong>1003294905</strong></div>
    </div>

    <script src="common.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const videoInput = document.getElementById('videoInput');
        const clipBtn = document.getElementById('clipBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resultBox = document.getElementById('resultBox');
        const sizeInfo = document.getElementById('sizeInfo');
        const videoInfo = document.getElementById('videoInfo');
        const fileName = document.getElementById('fileName');
        const durationInfo = document.getElementById('durationInfo');
        const previewVideo = document.getElementById('previewVideo');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const startTime = document.getElementById('startTime');
        const endTime = document.getElementById('endTime');

        let videoFile = null, clipUrl = null;

        uploadArea.onclick = () => videoInput.click();
        setupDragDrop(uploadArea, (files) => {
            if (files[0]?.type.startsWith('video/')) handleVideo(files[0]);
            else showToast('请上传视频文件');
        });

        videoInput.onchange = (e) => handleVideo(e.target.files[0]);

        function handleVideo(f) {
            videoFile = f;
            fileName.textContent = '文件名：' + f.name + ' (' + formatSize(f.size) + ')';
            const url = URL.createObjectURL(f);
            previewVideo.src = url;
            previewVideo.style.display = 'block';
            previewVideo.onloadedmetadata = () => {
                const d = previewVideo.duration;
                const mins = Math.floor(d / 60);
                const secs = Math.floor(d % 60);
                durationInfo.textContent = '视频时长：' + mins + '分' + secs + '秒 (总' + d.toFixed(1) + 's)';
            };
            videoInfo.style.display = 'block';
            resultBox.style.display = 'none';
            downloadBtn.style.display = 'none';
        }

        function parseTime(str) {
            str = str.trim();
            if (str.includes(':')) {
                const parts = str.split(':');
                return parseInt(parts[0]) * 60 + parseFloat(parts[1]);
            }
            return parseFloat(str);
        }

        clipBtn.onclick = async () => {
            if (!videoFile) { showToast('请先上传视频'); return; }

            const start = parseTime(startTime.value);
            const end = parseTime(endTime.value);
            if (isNaN(start) || isNaN(end)) { showToast('请输入有效的时间'); return; }
            if (start >= end) { showToast('开始时间必须小于结束时间'); return; }

            clipBtn.disabled = true;
            clipBtn.textContent = '截取中...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            resultBox.style.display = 'none';
            downloadBtn.style.display = 'none';

            try {
                const duration = end - start;
                const video = document.createElement('video');
                video.preload = 'auto';
                video.muted = true;
                const url = URL.createObjectURL(videoFile);

                await new Promise((resolve, reject) => {
                    video.onloadedmetadata = resolve;
                    video.onerror = () => reject(new Error('视频加载失败'));
                    video.src = url;
                });

                video.currentTime = start;
                await new Promise(r => { video.onseeked = r; });

                const stream = video.captureStream(30);
                const chunks = [];
                let mimeType = 'video/webm';
                if (!MediaRecorder.isTypeSupported('video/webm')) {
                    mimeType = 'video/webm;codecs=vp8';
                    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
                }
                const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
                recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

                const startTimeRecord = Date.now();
                recorder.start();

                video.play().catch(e => { throw new Error('播放失败：' + e.message); });

                const checkEnd = setInterval(() => {
                    const elapsed = (Date.now() - startTimeRecord) / 1000;
                    if (elapsed >= duration) {
                        clearInterval(checkEnd);
                        video.pause();
                        recorder.stop();
                    }
                    progressFill.style.width = Math.min(elapsed / duration * 100, 100) + '%';
                }, 100);

                await new Promise((resolve) => {
                    recorder.onstop = () => {
                        clearInterval(checkEnd);
                        resolve();
                    };
                });

                URL.revokeObjectURL(url);
                const clipBlob = new Blob(chunks, { type: mimeType || 'video/webm' });
                clipUrl = URL.createObjectURL(clipBlob);

                sizeInfo.innerHTML = '原始视频：' + formatSize(videoFile.size) + '<br>截取片段：<span class="highlight">' + formatSize(clipBlob.size) + '</span><br>时长：<span class="highlight">' + duration.toFixed(1) + 's</span>';
                resultBox.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
            } catch (e) {
                showToast('截取失败：' + e.message);
            } finally {
                clipBtn.disabled = false;
                clipBtn.textContent = '开始截取';
                progressBar.style.display = 'none';
            }
        };

        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = clipUrl;
            a.download = (videoFile?.name || 'video').replace(/\.\w+$/, '') + '-剪辑.webm';
            a.click();
        };
    </script>
</body>
</html>
