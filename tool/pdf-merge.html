<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta property="og:title" content="PDF合并 | PC-TOOL">
    <meta property="og:description" content="免费在线工具集合——图片转换、视频压缩、音频转格式、图片抠图……每一个功能都为效率而生，完全免费，为人民服务！">
    <meta property="og:image" content="https://www.pc-tool.cn/avatar.jpg">
    <meta property="og:url" content="https://www.pc-tool.cn/tool/pdf-merge.html">

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        #pdfInput { display: none; }
        .file-list {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            gap: 10px;
        }
        .file-item .name {
            flex: 1;
            color: #e4e4e7;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-item .size {
            color: #71717a;
            font-size: 12px;
            flex-shrink: 0;
        }
        .file-item .remove-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #a1a1aa;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .file-item .remove-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .file-item .drag-handle {
            cursor: grab;
            color: #52525b;
            font-size: 16px;
            flex-shrink: 0;
            user-select: none;
        }
        .file-item.dragging {
            opacity: 0.5;
        }
        .file-item.drag-over {
            border-color: rgba(129, 140, 248, 0.5);
            background: rgba(129, 140, 248, 0.08);
        }
    </style>
</head>
<body>
    <script>
        (function(){var u=navigator.userAgent||navigator.vendor||window.opera;var m=/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|webOS/i.test(u);var t=/iPad|Android(?!.*Mobile)|Tablet|PlayBook|Silk/i.test(u)||(/(?:Macintosh|Windows)/i.test(u)&&'ontouchend' in document&&window.innerWidth<=1024);if((m||t)&&window.location.pathname.indexOf('mobile.html')===-1)window.location.replace('../mobile.html');})();
    </script>
    <canvas id="bg-canvas" class="bg-canvas"></canvas>

    <a href="../index.html" class="back-link">← 返回转换工具首页</a>

    <div class="container">
        <h1>PDF合并</h1>
        <p>多个PDF合并成一个，拖拽调整顺序，纯前端处理</p>

        <div class="upload-area" id="uploadArea">
            <p>点击或拖拽上传多个PDF文件</p>
            <input type="file" id="pdfInput" accept=".pdf" multiple>
        </div>

        <div class="file-list" id="fileList"></div>

        <div style="text-align:center;">
            <button class="convert-btn" id="mergeBtn">开始合并</button>
            <button class="download-btn" id="downloadBtn">下载合并PDF</button>
        </div>

        <div class="result-box" id="resultBox">
            <h3>合并完成</h3>
            <div class="size-info" id="sizeInfo"></div>
        </div>

        <div class="contact-tip">面向大众，有任何想要的功能或者意见，请联系QQ：<strong>1003294905</strong></div>
    </div>

    <script src="common.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const pdfInput = document.getElementById('pdfInput');
        const mergeBtn = document.getElementById('mergeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resultBox = document.getElementById('resultBox');
        const sizeInfo = document.getElementById('sizeInfo');
        const fileList = document.getElementById('fileList');

        let pdfFiles = [];
        let mergedUrl = null;

        uploadArea.onclick = () => pdfInput.click();
        setupDragDrop(uploadArea, (files) => {
            const pdfs = Array.from(files).filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
            if (pdfs.length > 0) addFiles(pdfs);
            else showToast('请上传PDF文件');
        });

        pdfInput.onchange = (e) => addFiles(Array.from(e.target.files));
        pdfInput.value = '';

        function addFiles(files) {
            pdfFiles.push(...files);
            renderFileList();
        }

        function removeFile(index) {
            pdfFiles.splice(index, 1);
            renderFileList();
            resultBox.style.display = 'none';
            downloadBtn.style.display = 'none';
        }

        function renderFileList() {
            fileList.innerHTML = pdfFiles.map((f, i) => `
                <div class="file-item" draggable="true" data-index="${i}">
                    <span class="drag-handle">⋮⋮</span>
                    <span class="name">${f.name}</span>
                    <span class="size">${formatSize(f.size)}</span>
                    <button class="remove-btn" data-index="${i}">✕</button>
                </div>
            `).join('');

            fileList.querySelectorAll('.remove-btn').forEach(btn => {
                btn.onclick = () => removeFile(parseInt(btn.dataset.index));
            });

            let dragIdx = -1;
            fileList.querySelectorAll('.file-item').forEach(item => {
                item.ondragstart = (e) => {
                    dragIdx = parseInt(item.dataset.index);
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                };
                item.ondragend = () => item.classList.remove('dragging');
                item.ondragover = (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    item.classList.add('drag-over');
                };
                item.ondragleave = () => item.classList.remove('drag-over');
                item.ondrop = (e) => {
                    e.preventDefault();
                    item.classList.remove('drag-over');
                    const targetIdx = parseInt(item.dataset.index);
                    if (dragIdx !== targetIdx) {
                        const [moved] = pdfFiles.splice(dragIdx, 1);
                        pdfFiles.splice(targetIdx, 0, moved);
                        renderFileList();
                    }
                };
            });
        }

        mergeBtn.onclick = async () => {
            if (pdfFiles.length < 2) { showToast('请至少添加2个PDF文件'); return; }

            mergeBtn.disabled = true;
            mergeBtn.textContent = '合并中...';
            resultBox.style.display = 'none';
            downloadBtn.style.display = 'none';

            try {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();

                for (const file of pdfFiles) {
                    const ab = await file.arrayBuffer();
                    const pdf = await PDFDocument.load(ab);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach(page => mergedPdf.addPage(page));
                }

                const mergedBytes = await mergedPdf.save();
                const blob = new Blob([mergedBytes], { type: 'application/pdf' });

                if (mergedUrl) URL.revokeObjectURL(mergedUrl);
                mergedUrl = URL.createObjectURL(blob);

                const totalSize = pdfFiles.reduce((s, f) => s + f.size, 0);
                sizeInfo.innerHTML = '文件数：<span class="highlight">' + pdfFiles.length + '</span><br>合并前总大小：' + formatSize(totalSize) + '<br>合并后大小：<span class="highlight">' + formatSize(blob.size) + '</span>';
                resultBox.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
            } catch (e) {
                showToast('合并失败：' + e.message);
            } finally {
                mergeBtn.disabled = false;
                mergeBtn.textContent = '开始合并';
            }
        };

        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = mergedUrl;
            a.download = '合并文档.pdf';
            a.click();
        };
    </script>
</body>
</html>
