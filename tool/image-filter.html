    <script>
        (function () {
            var mainUploadArea = document.getElementById('mainUploadArea');
            var mainFileInput = document.getElementById('mainFileInput');
            var actionArea = document.getElementById('actionArea');
            var canvas = document.getElementById('previewCanvas');
            var downloadBtn = document.getElementById('downloadBtn');
            var outputFormat = document.getElementById('outputFormat');

            var imgSize = document.getElementById('imgSize');
            var imgType = document.getElementById('imgType');

            // 滑块
            var slBrightness = document.getElementById('brightness');
            var slContrast = document.getElementById('contrast');
            var slSaturate = document.getElementById('saturate');
            var slHue = document.getElementById('hue');
            var slBlur = document.getElementById('blur');
            var slSepia = document.getElementById('sepia');
            var slGrayscale = document.getElementById('grayscale');

            var valBrightness = document.getElementById('brightnessVal');
            var valContrast = document.getElementById('contrastVal');
            var valSaturate = document.getElementById('saturateVal');
            var valHue = document.getElementById('hueVal');
            var valBlur = document.getElementById('blurVal');
            var valSepia = document.getElementById('sepiaVal');
            var valGrayscale = document.getElementById('grayscaleVal');

            var originalImage = null;
            var sourceFileName = '';

            // 各参数默认值
            var defaults = {
                brightness: 100,
                contrast: 100,
                saturate: 100,
                hue: 0,
                blur: 0,
                sepia: 0,
                grayscale: 0
            };

            // 当前激活的预设
            var activePreset = 'none';

            // ===== 上传 =====
            mainUploadArea.addEventListener('click', function () {
                mainFileInput.value = '';
                mainFileInput.click();
            });

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function (ev) {
                mainUploadArea.addEventListener(ev, function (e) { e.preventDefault(); e.stopPropagation(); });
            });

            mainUploadArea.addEventListener('drop', function (e) {
                var files = Array.from(e.dataTransfer.files).filter(function (f) { return f.type.startsWith('image/'); });
                if (files.length) loadImage(files[0]);
            });

            mainFileInput.addEventListener('change', function (e) {
                if (e.target.files.length) loadImage(e.target.files[0]);
            });

            function loadImage(file) {
                var reader = new FileReader();
                reader.onload = function (ev) {
                    var img = new Image();
                    img.onload = function () {
                        originalImage = img;
                        sourceFileName = file.name.replace(/\.[^.]+$/, '');
                        imgSize.textContent = img.width + ' x ' + img.height;
                        imgType.textContent = (file.type || 'unknown').toUpperCase();
                        actionArea.style.display = '';
                        resetAllFilters();
                        setActivePreset('none');
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }

            // ===== 构建 filter 字符串 =====
            function buildFilter() {
                var parts = [];
                parts.push('brightness(' + (slBrightness.value / 100) + ')');
                parts.push('contrast(' + (slContrast.value / 100) + ')');
                parts.push('saturate(' + (slSaturate.value / 100) + ')');
                parts.push('hue-rotate(' + slHue.value + 'deg)');
                parts.push('blur(' + slBlur.value + 'px)');
                parts.push('sepia(' + (slSepia.value / 100) + ')');
                parts.push('grayscale(' + (slGrayscale.value / 100) + ')');
                return parts.join(' ');
            }

            // ===== 更新画布 =====
            function updateCanvas() {
                if (!originalImage) return;

                var maxW = 750;
                var maxH = 520;
                var ratio = Math.min(maxW / originalImage.width, maxH / originalImage.height, 1);
                var cw = Math.floor(originalImage.width * ratio);
                var ch = Math.floor(originalImage.height * ratio);

                canvas.width = cw;
                canvas.height = ch;
                canvas.style.display = 'block';

                var ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, cw, ch);

                var filterStr = buildFilter();
                ctx.filter = filterStr;
                ctx.drawImage(originalImage, 0, 0, cw, ch);
                ctx.filter = 'none';

                // 更新数值显示
                valBrightness.textContent = slBrightness.value + '%';
                valContrast.textContent = slContrast.value + '%';
                valSaturate.textContent = slSaturate.value + '%';
                valHue.textContent = slHue.value + '°';
                valBlur.textContent = slBlur.value + 'px';
                valSepia.textContent = slSepia.value + '%';
                valGrayscale.textContent = slGrayscale.value + '%';
            }

            // ===== 滑块事件 =====
            [slBrightness, slContrast, slSaturate, slHue, slBlur, slSepia, slGrayscale].forEach(function (sl) {
                sl.addEventListener('input', function () {
                    setActivePreset('none');
                    updateCanvas();
                });
            });

            // ===== 重置单个 =====
            document.querySelectorAll('.reset-btn-sm').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var target = this.getAttribute('data-target');
                    var sliderMap = {
                        brightness: slBrightness,
                        contrast: slContrast,
                        saturate: slSaturate,
                        hue: slHue,
                        blur: slBlur,
                        sepia: slSepia,
                        grayscale: slGrayscale
                    };
                    var slider = sliderMap[target];
                    if (slider && defaults[target] !== undefined) {
                        slider.value = defaults[target];
                        setActivePreset('none');
                        updateCanvas();
                    }
                });
            });

            // ===== 重置全部 =====
            document.getElementById('resetAllBtn').addEventListener('click', function () {
                resetAllFilters();
                setActivePreset('none');
            });

            function resetAllFilters() {
                slBrightness.value = defaults.brightness;
                slContrast.value = defaults.contrast;
                slSaturate.value = defaults.saturate;
                slHue.value = defaults.hue;
                slBlur.value = defaults.blur;
                slSepia.value = defaults.sepia;
                slGrayscale.value = defaults.grayscale;
                updateCanvas();
            }

            // ===== 预设滤镜 =====
            var presets = {
                none: { brightness: 100, contrast: 100, saturate: 100, hue: 0, blur: 0, sepia: 0, grayscale: 0 },
                film:  { brightness: 105, contrast: 110, saturate: 80,  hue: 0, blur: 0, sepia: 15, grayscale: 0 },
                warm:  { brightness: 110, contrast: 95,  saturate: 120, hue: 5, blur: 0, sepia: 25, grayscale: 0 },
                cool:  { brightness: 100, contrast: 105, saturate: 110, hue: -15, blur: 0, sepia: 0, grayscale: 0 },
                vivid: { brightness: 105, contrast: 120, saturate: 160, hue: 0, blur: 0, sepia: 0, grayscale: 0 },
                bw:    { brightness: 105, contrast: 110, saturate: 0,   hue: 0, blur: 0, sepia: 0, grayscale: 100 },
                vintage:{ brightness: 95,  contrast: 90,  saturate: 70,  hue: 10, blur: 0, sepia: 40, grayscale: 10 },
                fade:  { brightness: 115, contrast: 85,  saturate: 50,  hue: 0, blur: 0.5, sepia: 10, grayscale: 0 }
            };

            function setActivePreset(name) {
                activePreset = name;
                document.querySelectorAll('#presetRow .preset-btn').forEach(function (btn) {
                    if (btn.getAttribute('data-preset') === name) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }

            function applyPreset(name) {
                var p = presets[name];
                if (!p) return;
                slBrightness.value = p.brightness;
                slContrast.value = p.contrast;
                slSaturate.value = p.saturate;
                slHue.value = p.hue;
                slBlur.value = p.blur;
                slSepia.value = p.sepia;
                slGrayscale.value = p.grayscale;
                updateCanvas();
                setActivePreset(name);
            }

            document.querySelectorAll('#presetRow .preset-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var name = this.getAttribute('data-preset');
                    applyPreset(name);
                });
            });

            // ===== 下载 =====
            downloadBtn.addEventListener('click', function () {
                if (!originalImage) return;

                var fmt = outputFormat.value;
                var dataUrl;

                // 对于非模糊的图片，可以直接在原尺寸绘制导出
                if (slBlur.value === '0') {
                    // 全尺寸绘制
                    var tmpCanvas = document.createElement('canvas');
                    tmpCanvas.width = originalImage.width;
                    tmpCanvas.height = originalImage.height;
                    var ctx = tmpCanvas.getContext('2d');
                    ctx.filter = buildFilter();
                    ctx.drawImage(originalImage, 0, 0);
                    ctx.filter = 'none';
                    dataUrl = tmpCanvas.toDataURL('image/' + fmt, 0.92);
                } else {
                    // 有模糊时需要额外边距
                    var blurPx = parseFloat(slBlur.value);
                    var pad = Math.ceil(blurPx * 3);
                    var tmpCanvas = document.createElement('canvas');
                    tmpCanvas.width = originalImage.width + pad * 2;
                    tmpCanvas.height = originalImage.height + pad * 2;
                    var ctx = tmpCanvas.getContext('2d');
                    ctx.filter = buildFilter();
                    ctx.drawImage(originalImage, pad, pad);
                    ctx.filter = 'none';
                    dataUrl = tmpCanvas.toDataURL('image/' + fmt, 0.92);
                }

                var a = document.createElement('a');
                a.href = dataUrl;
                a.download = (sourceFileName || 'filtered') + '-图片调色.' + fmt;
                a.click();
            });
        })();
    </script>
</body>
</html>
