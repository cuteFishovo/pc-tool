    <style>
        #videoInput {

        .preview-video {

<body>
    <script>
        (function(){var u=navigator.userAgent||navigator.vendor||window.opera;var m=/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|webOS/i.test(u);var t=/iPad|Android(?!.*Mobile)|Tablet|PlayBook|Silk/i.test(u)||(/(?:Macintosh|Windows)/i.test(u)&&'ontouchend' in document&&window.innerWidth<=1024);if((m||t)&&window.location.pathname.indexOf('mobile.html')===-1)window.location.replace('../mobile.html');})();

    <canvas id="bg-canvas" class="bg-canvas"></canvas>

    <div class="container">
        <h1>视频转格式</h1>
        <p>上传视频文件并转换为 WebM，纯浏览器端处理，无需额外依赖</p>

        <div class="upload-area" id="uploadArea">
            <p>点击或拖拽上传视频</p>
            <input type="file" id="videoInput" accept="video/*">
        </div>

        <div id="videoInfo" style="text-align:center; margin:15px 0; display:none;">
            <p id="fileName" style="color:#e4e4e7;"></p>
        </div>

        <video id="previewVideo" class="preview-video" controls></video>
        <video id="renderVideo" style="display:none;" muted playsinline crossorigin="anonymous"></video>
        <canvas id="renderCanvas" style="display:none;"></canvas>

        <div class="option-row">
            <label>输出分辨率:</label>
            <select class="format-select" id="resolutionSelect">
                <option value="original">原始分辨率</option>
                <option value="1080p">1080p (1920x1080)</option>
                <option value="720p" selected>720p (1280x720)</option>
                <option value="480p">480p (854x480)</option>
                <option value="360p">360p (640x360)</option>
            </select>
        </div>

        <div class="option-row">
            <label>质量:</label>
            <input type="range" id="qualityRange" min="1" max="10" value="7" step="1">
            <span id="qualityVal">70%</span>
        </div>

        <div style="text-align:center;">
            <select class="format-select" id="outputFormat">
                <option value="webm" selected>WebM (VP8)</option>
                <option value="webm-vp9">WebM (VP9)</option>
            </select>
            <button class="convert-btn" id="convertBtn">开始转换</button>
            <button class="download-btn" id="downloadBtn">下载视频</button>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="fill" id="progressFill"></div>
        </div>
        <p id="progressText" style="text-align:center; color:#a1a1aa; font-size:13px; margin-top:4px; display:none;"></p>

        <div class="result-box" id="resultBox">
            <h3>转换完成</h3>
            <div id="sizeInfo" style="color:#a1a1aa; font-size:14px; margin-top:8px;"></div>
        </div>

        <div class="hint-box">
            <strong>说明：</strong>浏览器环境下稳定可用的输出格式为 WebM。原页面依赖 FFmpeg wasm，容易因运行环境、CDN、worker 或编解码器初始化失败导致无法转换，现已改为浏览器原生方案。
        </div>

        <div class="contact-tip">面向大众，有任何想要的功能或者意见，请联系QQ：<strong>1003294905</strong></div>
    </div>

    <script src="../tool/common.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const videoInput = document.getElementById('videoInput');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const outputFormat = document.getElementById('outputFormat');
        const resolutionSelect = document.getElementById('resolutionSelect');
        const qualityRange = document.getElementById('qualityRange');
        const qualityVal = document.getElementById('qualityVal');
        const resultBox = document.getElementById('resultBox');
        const sizeInfo = document.getElementById('sizeInfo');
        const videoInfo = document.getElementById('videoInfo');
        const fileName = document.getElementById('fileName');
        const previewVideo = document.getElementById('previewVideo');
        const renderVideo = document.getElementById('renderVideo');
        const renderCanvas = document.getElementById('renderCanvas');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        let videoFile = null;
        let previewUrl = null;
        let outputUrl = null;
        let outputBlob = null;
        let isConverting = false;

        qualityRange.oninput = () => {
            qualityVal.textContent = (qualityRange.value * 10) + '%';
        };

        function setProgress(percent, text) {
            progressBar.style.display = 'block';
            progressText.style.display = 'block';
            progressFill.style.width = Math.max(0, Math.min(100, percent)) + '%';
            progressText.textContent = text;
        }

        function resetProgress() {
            progressBar.style.display = 'none';
            progressText.style.display = 'none';
            progressFill.style.width = '0%';
            progressText.textContent = '';
        }

        function revokeUrl(url) {
            if (url) {
                URL.revokeObjectURL(url);
            }
        }

        function cleanupOutput() {
            revokeUrl(outputUrl);
            outputUrl = null;
            outputBlob = null;
            downloadBtn.style.display = 'none';
            resultBox.style.display = 'none';
        }

        function getResolution(videoW, videoH) {
            const res = resolutionSelect.value;
            if (res === 'original') {
                return { w: videoW, h: videoH };
            }

            const map = {
                '1080p': 1080,
                '720p': 720,
                '480p': 480,
                '360p': 360
            };
            const targetH = map[res] || 720;
            const ratio = videoW / videoH;
            const h = Math.min(targetH, videoH);
            const w = Math.round(h * ratio);
            return {
                w: Math.max(2, w - (w % 2)),
                h: Math.max(2, h - (h % 2))
            };
        }

        function getMimeCandidates(format) {
            if (format === 'webm-vp9') {
                return [
                    'video/webm;codecs=vp9,opus',
                    'video/webm;codecs=vp9',
                    'video/webm;codecs=vp8,opus',
                    'video/webm'
                ];
            }
            return [
                'video/webm;codecs=vp8,opus',
                'video/webm;codecs=vp8',
                'video/webm'
            ];
        }

        function getSupportedMimeType(format) {
            const candidates = getMimeCandidates(format);
            for (const mime of candidates) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(mime)) {
                    return mime;
                }
            }
            return '';
        }

        function estimateBitrate() {
            const quality = Number(qualityRange.value);
            const map = {
                1: 900000,
                2: 1200000,
                3: 1500000,
                4: 2000000,
                5: 2500000,
                6: 3200000,
                7: 4000000,
                8: 5200000,
                9: 6800000,
                10: 8500000
            };
            return map[quality] || 4000000;
        }

        function waitForEvent(target, eventName) {
            return new Promise((resolve, reject) => {
                const onSuccess = () => {
                    cleanup();
                    resolve();
                };
                const onError = () => {
                    cleanup();
                    reject(new Error('视频加载失败'));
                };
                const cleanup = () => {
                    target.removeEventListener(eventName, onSuccess);
                    target.removeEventListener('error', onError);
                };
                target.addEventListener(eventName, onSuccess, { once: true });
                target.addEventListener('error', onError, { once: true });
            });
        }

        function waitForRecorderStop(recorder) {
            return new Promise((resolve) => {
                recorder.addEventListener('stop', resolve, { once: true });
            });
        }

        uploadArea.onclick = () => videoInput.click();

        setupDragDrop(uploadArea, (files) => {
            if (files[0] && files[0].type.startsWith('video/')) {
                handleVideo(files[0]);
                return;
            }
            showToast('请上传视频文件');
        });

        videoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                handleVideo(file);
            }
        };

        function handleVideo(file) {
            if (!file || !file.type.startsWith('video/')) {
                showToast('请上传视频文件');
                return;
            }

            if (isConverting) {
                showToast('请等待当前转换完成');
                return;
            }

            revokeUrl(previewUrl);
            cleanupOutput();
            resetProgress();

            videoFile = file;
            previewUrl = URL.createObjectURL(file);
            fileName.textContent = '文件名：' + file.name + '（' + formatSize(file.size) + '）';
            videoInfo.style.display = 'block';
            previewVideo.src = previewUrl;
            previewVideo.style.display = 'block';
        }

        async function convertToWebM(file, format) {
            const mimeType = getSupportedMimeType(format);
            if (!mimeType) {
                throw new Error('当前浏览器不支持所选 WebM 编码格式');
            }

            const sourceUrl = URL.createObjectURL(file);
            const chunks = [];
            let drawTimer = null;

            try {
                renderVideo.src = sourceUrl;
                renderVideo.muted = true;
                renderVideo.playsInline = true;
                renderVideo.preload = 'auto';
                await waitForEvent(renderVideo, 'loadedmetadata');

                const duration = renderVideo.duration;
                if (!Number.isFinite(duration) || duration <= 0) {
                    throw new Error('无法读取视频时长');
                }

                const resolution = getResolution(renderVideo.videoWidth, renderVideo.videoHeight);
                renderCanvas.width = resolution.w;
                renderCanvas.height = resolution.h;
                const ctx = renderCanvas.getContext('2d');
                if (!ctx) {
                    throw new Error('浏览器不支持画布绘制');
                }

                setProgress(10, '正在准备视频帧...');
                const stream = renderCanvas.captureStream(30);
                const recorder = new MediaRecorder(stream, {
                    mimeType,
                    videoBitsPerSecond: estimateBitrate()
                });

                recorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        chunks.push(event.data);
                    }
                };

                const stopPromise = waitForRecorderStop(recorder);
                recorder.start(250);

                await renderVideo.play();
                setProgress(20, '正在转换视频...');

                const drawFrame = () => {
                    if (renderVideo.paused || renderVideo.ended) {
                        return;
                    }
                    ctx.drawImage(renderVideo, 0, 0, renderCanvas.width, renderCanvas.height);
                    const percent = Math.min(95, 20 + (renderVideo.currentTime / duration) * 75);
                    setProgress(percent, '正在转换视频... ' + Math.round((renderVideo.currentTime / duration) * 100) + '%');
                };

                drawTimer = setInterval(drawFrame, 1000 / 30);
                drawFrame();

                await new Promise((resolve, reject) => {
                    renderVideo.onended = resolve;
                    renderVideo.onerror = () => reject(new Error('视频播放失败，无法完成转换'));
                });

                if (drawTimer) {
                    clearInterval(drawTimer);
                    drawTimer = null;
                }

                ctx.drawImage(renderVideo, 0, 0, renderCanvas.width, renderCanvas.height);
                recorder.stop();
                await stopPromise;

                const blob = new Blob(chunks, { type: mimeType.split(';')[0] || 'video/webm' });
                if (!blob.size) {
                    throw new Error('转换结果为空');
                }
                return blob;
            } finally {
                if (drawTimer) {
                    clearInterval(drawTimer);
                }
                renderVideo.pause();
                renderVideo.removeAttribute('src');
                renderVideo.load();
                revokeUrl(sourceUrl);
            }
        }

        convertBtn.onclick = async () => {
            if (!videoFile) {
                showToast('请先上传视频');
                return;
            }
            if (isConverting) {
                return;
            }

            isConverting = true;
            cleanupOutput();
            convertBtn.disabled = true;
            convertBtn.textContent = '转换中...';

            try {
                outputBlob = await convertToWebM(videoFile, outputFormat.value);
                outputUrl = URL.createObjectURL(outputBlob);
                setProgress(100, '转换完成！');

                sizeInfo.innerHTML = '原始视频：' + formatSize(videoFile.size) +
                    '<br>转换后：<span style="color:#34d399;">' + formatSize(outputBlob.size) + '</span>' +
                    '<br>格式：<span style="color:#818cf8;">WEBM</span>';
                resultBox.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
            } catch (error) {
                resetProgress();
                showToast('转换失败：' + (error.message || error));
            } finally {
                isConverting = false;
                convertBtn.disabled = false;
                convertBtn.textContent = '开始转换';
            }
        };

        downloadBtn.onclick = () => {
            if (!outputUrl || !outputBlob || !videoFile) {
                return;
            }
            const originalName = videoFile.name.replace(/\.[^.]+$/, '') || 'video';
            const a = document.createElement('a');
            a.href = outputUrl;
            a.download = originalName + '-格式转换.webm';
            a.click();
        };

        window.addEventListener('beforeunload', () => {
            revokeUrl(previewUrl);
            revokeUrl(outputUrl);
        });
    </script>
</body>
