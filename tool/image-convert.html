<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="免费在线图片格式转换工具，支持JPG、PNG、WebP、GIF、BMP、PDF互转，支持裁剪，纯浏览器端处理，安全快捷。">
    <link rel="stylesheet" href="common.css">
    <!-- OGP 社交分享标签 -->
    <meta property="og:title" content="图片转格式 | PC-TOOL">
    <meta property="og:description" content="免费在线工具集合——图片转换、视频压缩、音频转格式、图片抠图……每一个功能都为效率而生，完全免费，为人民服务！">
    <meta property="og:image" content="https://www.pc-tool.cn/avatar.jpg">
    <meta property="og:url" content="https://www.pc-tool.cn/tool/image-convert.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PC-TOOL">
    <meta property="og:locale" content="zh_CN">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css">
    <style>
        .crop-switch {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            gap: 12px;
            font-size: 16px;
            color: #cdcdd3;
        }

        .switch-btn {
            width: 50px;
            height: 26px;
            background: #3f3f46;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .switch-btn::after {
            content: '';
            width: 22px;
            height: 22px;
            background: #a1a1aa;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .switch-btn.on { background: #818cf8; }
        .switch-btn.on::after { left: 26px; background: white; }

        .img-crop-container {
            display: none;
            margin: 20px auto;
            width: 100%;
            max-width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #cropImage {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .crop-btn {
            padding: 10px 20px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
            display: none;
            transition: all 0.3s;
        }

        .crop-btn:hover { background: #d35400; }

        .preview-img {
            max-width: 100%;
            max-height: 400px;
            margin: 20px auto;
            border-radius: 8px;
            display: none;
            object-fit: contain;
        }

        .pdf-preview-box {
            padding: 20px;
            font-size: 18px;
            color: #818cf8;
            text-align: center;
        }
    </style>
</head>
<body>
    <script>
        (function(){var u=navigator.userAgent||navigator.vendor||window.opera;var m=/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|webOS/i.test(u);var t=/iPad|Android(?!.*Mobile)|Tablet|PlayBook|Silk/i.test(u)||(/(?:Macintosh|Windows)/i.test(u)&&'ontouchend' in document&&window.innerWidth<=1024);if((m||t)&&window.location.pathname.indexOf('mobile.html')===-1)window.location.replace('../mobile.html');})();
    </script>
    <canvas id="bg-canvas" class="bg-canvas"></canvas>

    <a href="../index.html" class="back-link">← 返回转换工具首页</a>

    <div class="container">
        <h1>图片转格式</h1>
        <p>支持JPG、PNG、WebP、GIF、BMP、PDF图片格式互转，支持裁剪</p>
        <div class="crop-switch">
            <span>裁剪功能：</span>
            <div class="switch-btn" id="cropSwitch"></div>
            <span id="cropStatus">关闭</span>
        </div>
        <div class="upload-area" id="uploadArea">
            <p>点击或拖拽上传图片</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="img-crop-container" id="cropContainer">
            <img id="cropImage" alt="裁剪图片">
        </div>
        <button id="cropBtn" class="crop-btn">确认裁剪</button>
        <img id="previewImage" class="preview-img" alt="预览图">
        <div style="text-align:center; margin:20px 0;">
            <select class="format-select" id="outputFormat">
                <option value="jpg">JPG</option>
                <option value="png">PNG</option>
                <option value="webp">WebP</option>
                <option value="gif">GIF</option>
                <option value="bmp">BMP</option>
                <option value="pdf">PDF</option>
            </select>
            <button class="convert-btn" id="convertBtn">开始转换</button>
            <button class="download-btn" id="downloadBtn">下载转换后的文件</button>
        </div>
        <div class="result-box" id="resultBox">
            <h3>转换完成</h3>
            <img id="convertedImage" class="preview-img">
            <div id="pdfPreview" class="pdf-preview-box"></div>
        </div>
        <div class="contact-tip">面向大众，有任何想要的功能或者意见，请联系QQ：<strong>1003294905</strong></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>

    <script src="common.js"></script>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const cropContainer = document.getElementById('cropContainer');
        const cropImage = document.getElementById('cropImage');
        const cropBtn = document.getElementById('cropBtn');
        const previewImage = document.getElementById('previewImage');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const outputFormat = document.getElementById('outputFormat');
        const resultBox = document.getElementById('resultBox');
        const convertedImage = document.getElementById('convertedImage');
        const pdfPreview = document.getElementById('pdfPreview');
        const cropSwitch = document.getElementById('cropSwitch');
        const cropStatus = document.getElementById('cropStatus');
        let cropEnabled = false;
        let cropper;
        let croppedUrl = null;
        let originalFileUrl = null;
        let convertedUrl = null;
        let originalFileName = '';

        cropSwitch.onclick = () => {
            cropEnabled = !cropEnabled;
            cropSwitch.classList.toggle('on', cropEnabled);
            cropStatus.textContent = cropEnabled ? '开启' : '关闭';
            if (!cropEnabled) {
                cropContainer.style.display = 'none';
                cropBtn.style.display = 'none';
                if (cropper) { cropper.destroy(); cropper = null; }
                if (originalFileUrl) {
                    croppedUrl = originalFileUrl;
                    previewImage.src = croppedUrl;
                    previewImage.style.display = 'block';
                }
            } else {
                if (originalFileUrl) {
                    cropContainer.style.display = 'block';
                    cropBtn.style.display = 'inline-block';
                    previewImage.style.display = 'none';
                    initCropper();
                }
            }
        };

        function initCropper() {
            if (cropper) cropper.destroy();
            cropImage.src = originalFileUrl;
            cropImage.onload = () => {
                cropper = new Cropper(cropImage, {
                    aspectRatio: NaN, viewMode: 1, autoCropArea: 0.9, responsive: true, autoCrop: true, zoomable: true, scalable: false
                });
            };
        }

        uploadArea.onclick = () => fileInput.click();
        fileInput.onchange = handleUpload;
        uploadArea.ondrop = e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f?.type.startsWith('image/')) handleUpload({ target: { files: [f] } }); };
        ['dragenter', 'dragover', 'dragleave'].forEach(ev => uploadArea.addEventListener(ev, e => e.preventDefault()));

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            originalFileName = file.name.replace(/\.\w+$/, '');
            originalFileUrl = URL.createObjectURL(file);
            if (!cropEnabled) {
                croppedUrl = originalFileUrl;
                previewImage.src = croppedUrl; previewImage.style.display = 'block';
                cropContainer.style.display = 'none'; cropBtn.style.display = 'none';
                return;
            }
            cropContainer.style.display = 'block'; cropBtn.style.display = 'inline-block'; previewImage.style.display = 'none';
            initCropper();
        }

        cropBtn.onclick = () => {
            cropper.getCroppedCanvas({ maxWidth: 6000, maxHeight: 6000 }).toBlob(b => {
                croppedUrl = URL.createObjectURL(b);
                previewImage.src = croppedUrl; previewImage.style.display = 'block';
                cropContainer.style.display = 'none'; cropBtn.style.display = 'none';
            });
        };

        convertBtn.onclick = () => {
            const u = croppedUrl || originalFileUrl;
            if (!u) { alert('请先上传图片！'); return; }
            resultBox.style.display = 'none'; convertedImage.style.display = 'none'; pdfPreview.innerText = ''; downloadBtn.style.display = 'none';
            const f = outputFormat.value.toLowerCase();
            if (f === 'pdf') {
                const { jsPDF } = jspdf;
                const img = new Image();
                img.src = u;
                img.onload = () => {
                    const p = new jsPDF({ orientation: img.width > img.height ? 'landscape' : 'portrait', unit: 'px', format: [img.width, img.height] });
                    p.addImage(img, 'PNG', 0, 0, img.width, img.height);
                    convertedUrl = p.output('bloburl');
                    resultBox.style.display = 'block';
                    pdfPreview.innerText = 'PDF已生成，无法预览，请下载查看';
                    downloadBtn.style.display = 'inline-block';
                };
            } else {
                const c = document.createElement('canvas');
                const ctx2 = c.getContext('2d');
                const img = new Image();
                img.src = u;
                img.onload = () => {
                    c.width = img.width; c.height = img.height; ctx2.drawImage(img, 0, 0);
                    convertedUrl = c.toDataURL('image/' + f, 0.95);
                    convertedImage.src = convertedUrl; convertedImage.style.display = 'block';
                    resultBox.style.display = 'block'; downloadBtn.style.display = 'inline-block';
                };
            }
        };

        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = convertedUrl;
            a.download = originalFileName + '-图片格式转换.' + outputFormat.value;
            a.click();
        };
    </script>
</body>
</html>
