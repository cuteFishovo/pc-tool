<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频截图/取帧</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta name="description" content="免费在线视频截图取帧工具，播放到某一帧导出为图片，支持JPG/PNG格式，纯浏览器端处理，安全免费。">
    <link rel="stylesheet" href="common.css">
    <meta property="og:title" content="视频截图/取帧 | PC-TOOL">
    <meta property="og:description" content="免费在线工具集合——图片转换、视频压缩、音频转格式、图片抠图……每一个功能都为效率而生，完全免费，为人民服务！">
    <meta property="og:image" content="https://www.pc-tool.cn/avatar.jpg">
    <meta property="og:url" content="https://www.pc-tool.cn/tool/video-screenshot.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PC-TOOL">
    <meta property="og:locale" content="zh_CN">
    <style>
        #videoInput { display: none; }
        video {
            max-width: 100%;
            border-radius: 8px;
            display: none;
            margin: 10px auto;
        }
    </style>
</head>
<body>
    <script>
        (function(){var u=navigator.userAgent||navigator.vendor||window.opera;var m=/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|webOS/i.test(u);var t=/iPad|Android(?!.*Mobile)|Tablet|PlayBook|Silk/i.test(u)||(/(?:Macintosh|Windows)/i.test(u)&&'ontouchend' in document&&window.innerWidth<=1024);if((m||t)&&window.location.pathname.indexOf('mobile.html')===-1)window.location.replace('../mobile.html');})();
    </script>
    <canvas id="bg-canvas" class="bg-canvas"></canvas>

    <a href="../index.html" class="back-link">← 返回转换工具首页</a>

    <div class="container">
        <h1>视频截图/取帧</h1>
        <p>播放视频到目标帧，一键导出为图片</p>

        <div class="upload-area" id="uploadArea">
            <p>点击或拖拽上传视频</p>
            <input type="file" id="videoInput" accept="video/*">
        </div>

        <div id="videoInfo" style="text-align:center; margin:10px 0; display:none;">
            <p id="fileName" style="color:#e4e4e7;"></p>
        </div>

        <video id="previewVideo" controls></video>

        <div style="text-align:center;">
            <select class="format-select" id="outputFormat">
                <option value="png">PNG 格式</option>
                <option value="jpg">JPG 格式</option>
            </select>
            <button class="convert-btn" id="captureBtn">截取当前帧</button>
            <button class="download-btn" id="downloadBtn">下载图片</button>
        </div>

        <div class="result-box" id="resultBox">
            <h3>截图完成</h3>
            <img id="screenshotPreview" style="max-width:100%; border-radius:8px; margin-top:10px;">
            <div class="size-info" id="sizeInfo" style="margin-top:8px;"></div>
        </div>

        <div class="contact-tip">面向大众，有任何想要的功能或者意见，请联系QQ：<strong>1003294905</strong></div>
    </div>

    <script src="common.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const videoInput = document.getElementById('videoInput');
        const captureBtn = document.getElementById('captureBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resultBox = document.getElementById('resultBox');
        const sizeInfo = document.getElementById('sizeInfo');
        const videoInfo = document.getElementById('videoInfo');
        const fileName = document.getElementById('fileName');
        const previewVideo = document.getElementById('previewVideo');
        const outputFormat = document.getElementById('outputFormat');
        const screenshotPreview = document.getElementById('screenshotPreview');

        let videoFile = null, imageUrl = null;

        uploadArea.onclick = () => videoInput.click();
        setupDragDrop(uploadArea, (files) => {
            if (files[0]?.type.startsWith('video/')) handleVideo(files[0]);
            else showToast('请上传视频文件');
        });

        videoInput.onchange = (e) => handleVideo(e.target.files[0]);

        function handleVideo(f) {
            videoFile = f;
            fileName.textContent = '文件名：' + f.name + ' (' + formatSize(f.size) + ')';
            const url = URL.createObjectURL(f);
            previewVideo.src = url;
            previewVideo.style.display = 'block';
            videoInfo.style.display = 'block';
            resultBox.style.display = 'none';
            downloadBtn.style.display = 'none';
        }

        captureBtn.onclick = () => {
            if (!videoFile) { showToast('请先上传视频'); return; }

            const video = previewVideo;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const fmt = outputFormat.value;
            const mimeType = fmt === 'jpg' ? 'image/jpeg' : 'image/png';
            const quality = fmt === 'jpg' ? 0.92 : undefined;

            canvas.toBlob((blob) => {
                imageUrl = URL.createObjectURL(blob);
                screenshotPreview.src = imageUrl;
                sizeInfo.innerHTML = '格式：<span class="highlight">' + fmt.toUpperCase() + '</span> | 尺寸：<span class="highlight">' + canvas.width + '×' + canvas.height + '</span> | 大小：<span class="highlight">' + formatSize(blob.size) + '</span>';
                resultBox.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
            }, mimeType, quality);
        };

        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = imageUrl;
            const ext = outputFormat.value;
            a.download = (videoFile?.name || 'screenshot').replace(/\.\w+$/, '') + '-截图.' + ext;
            a.click();
        };
    </script>
</body>
</html>
