    <!-- 增强粒子背景 -->
    <script>
        (function () {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, mouseX = -9999, mouseY = -9999;

            function resize() {
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W;
                canvas.height = H;
            }
            window.addEventListener('resize', resize);
            resize();

            document.addEventListener('mousemove', function (e) { mouseX = e.clientX; mouseY = e.clientY; });
            document.addEventListener('mouseleave', function () { mouseX = -9999; mouseY = -9999; });

            var GS = 8, PS = 6;
            var WORM_COUNT = Math.floor((W * H) / 15000);
            var DUST_COUNT = Math.floor((W * H) / 7000);

            var PALETTE = [
                'rgba(16, 185, 129, ',
                'rgba(6, 182, 212, ',
                'rgba(168, 85, 247, ',
                'rgba(251, 146, 60, ',
                'rgba(236, 72, 153, ',
                'rgba(52, 211, 153, ',
                'rgba(129, 140, 248, ',
                'rgba(250, 204, 21, ',
            ];

            function rpick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

            var Worm = (function () {
                function W() { this.init(true); }
                W.prototype.init = function (pre) {
                    this.x = Math.random() * (W / GS);
                    this.y = Math.random() * (H / GS);
                    this.angle = Math.random() * Math.PI * 2;
                    this.speed = Math.random() * 0.1 + 0.03;
                    this.history = [];
                    this.maxLen = Math.floor(Math.random() * 65 + 20);
                    this.turn = (Math.random() - 0.5) * 0.035;
                    this.color = rpick(PALETTE);
                    this.glowColor = this.color.replace(')', '').replace('rgba', 'rgba');
                    if (pre) { var n = Math.floor(Math.random() * this.maxLen); for (var i = 0; i < n; i++) this.update(true); }
                };
                W.prototype.update = function (isInit) {
                    var fa = Math.sin(this.x * 0.035) * Math.cos(this.y * 0.035) * Math.PI * 2;
                    var dx = mouseX / GS - this.x, dy = mouseY / GS - this.y;
                    var d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 35 && d > 0) fa += Math.atan2(dy, dx) * (1 - d / 35) * 0.025;
                    this.angle += (fa - this.angle) * 0.018 + this.turn;
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                    var gx = Math.floor(this.x), gy = Math.floor(this.y);
                    if (this.history.length === 0 || this.history[this.history.length - 1].x !== gx || this.history[this.history.length - 1].y !== gy) {
                        this.history.push({ x: gx, y: gy });
                        if (this.history.length > this.maxLen) this.history.shift();
                    }
                    if (!isInit && (this.x < -15 || this.x > (W / GS) + 15 || this.y < -15 || this.y > (H / GS) + 15)) this.init();
                };
                W.prototype.draw = function (ctx) {
                    if (this.history.length < 2) return;
                    for (var i = 0; i < this.history.length; i++) {
                        var pos = this.history[i], px = pos.x * GS, py = pos.y * GS;
                        var alpha = 1, prog = i / this.history.length;
                        if (prog > 0.8) alpha = (1 - prog) * 5;
                        else if (prog < 0.2) alpha = prog * 5;
                        if (i === this.history.length - 1) { ctx.shadowColor = this.glowColor + '0.5)'; ctx.shadowBlur = 5; }
                        if (Math.random() > 0.96) alpha *= 0.15;
                        ctx.fillStyle = this.color + alpha + ')';
                        ctx.fillRect(px, py, PS, PS);
                        ctx.shadowBlur = 0;
                    }
                };
                return W;
            })();

            var Dust = (function () {
                function D() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.r = Math.random() * 2.2 + 0.8;
                    this.vx = (Math.random() - 0.5) * 0.25;
                    this.vy = (Math.random() - 0.5) * 0.25;
                    this.alpha = Math.random() * 0.45 + 0.15;
                    this.da = (Math.random() - 0.5) * 0.004;
                    this.color = rpick(PALETTE);
                }
                D.prototype.update = function () {
                    this.x += this.vx; this.y += this.vy;
                    this.alpha += this.da;
                    if (this.alpha > 0.65 || this.alpha < 0.04) this.da *= -1;
                    if (this.x < -10) this.x = W + 10; if (this.x > W + 10) this.x = -10;
                    if (this.y < -10) this.y = H + 10; if (this.y > H + 10) this.y = -10;
                    var dx = this.x - mouseX, dy = this.y - mouseY;
                    var d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 70 && d > 0) { this.x += (dx / d) * 0.35; this.y += (dy / d) * 0.35; }
                };
                D.prototype.draw = function (ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + this.alpha + ')';
                    ctx.fill();
                };
                return D;
            })();

            var worms = Array.from({ length: WORM_COUNT }, function () { return new Worm(); });
            var dusts = Array.from({ length: DUST_COUNT }, function () { return new Dust(); });

            window.addEventListener('resize', function () {
                var nc = Math.floor((window.innerWidth * window.innerHeight) / 15000);
                var nd = Math.floor((window.innerWidth * window.innerHeight) / 7000);
                while (worms.length < nc) worms.push(new Worm());
                if (nc < worms.length) worms = worms.slice(0, nc);
                while (dusts.length < nd) dusts.push(new Dust());
                if (nd < dusts.length) dusts = dusts.slice(0, nd);
            });

            function drawConnections() {
                var heads = [];
                for (var i = 0; i < worms.length; i++) {
                    if (worms[i].history.length === 0) continue;
                    heads.push(worms[i].history[worms[i].history.length - 1]);
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.025)';
                ctx.lineWidth = 0.5;
                for (var i = 0; i < heads.length; i++) {
                    var hx = heads[i].x * GS + PS / 2, hy = heads[i].y * GS + PS / 2;
                    for (var j = i + 1; j < heads.length; j++) {
                        var hx2 = heads[j].x * GS + PS / 2, hy2 = heads[j].y * GS + PS / 2;
                        var dist = Math.sqrt((hx - hx2) * (hx - hx2) + (hy - hy2) * (hy - hy2));
                        if (dist < 90) {
                            ctx.globalAlpha = (1 - dist / 90) * 0.25;
                            ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx2, hy2); ctx.stroke();
                            ctx.globalAlpha = 1;
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);
                for (var i = 0; i < dusts.length; i++) { dusts[i].update(); dusts[i].draw(ctx); }
                for (var i = 0; i < worms.length; i++) { worms[i].update(); worms[i].draw(ctx); }
                drawConnections();
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>

    <script>
        const videoUpload = document.getElementById('videoUploadArea');
        const videoFile = document.getElementById('videoFileInput');
        const extractBtn = document.getElementById('extractBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const audioFormat = document.getElementById('audioOutputFormat');
        const resultBox = document.getElementById('resultBox');
        const sizeInfo = document.getElementById('sizeInfo');
        const videoInfo = document.getElementById('videoInfo');
        const videoFileName = document.getElementById('videoFileName');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        let videoBlob = null, audioUrl = null, videoOriginalName = '';

        videoUpload.onclick = () => videoFile.click();
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => videoUpload.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation() }));
        ['dragenter', 'dragover'].forEach(e => videoUpload.addEventListener(e, () => videoUpload.style.background = 'rgba(129,140,248,0.1)'));
        ['dragleave', 'drop'].forEach(e => videoUpload.addEventListener(e, () => videoUpload.style.background = ''));

        videoUpload.ondrop = (e) => {
            const f = e.dataTransfer.files[0];
            if (f?.type.startsWith('video/')) handleVideo(f);
            else alert('请上传视频文件');
        };
        videoFile.onchange = (e) => handleVideo(e.target.files[0]);

        function handleVideo(f) {
            videoBlob = f;
            videoOriginalName = f.name.replace(/\.\w+$/, '');
            videoFileName.innerText = '文件名：' + f.name + ' (' + formatSize(f.size) + ')';
            videoInfo.style.display = 'block';
            resultBox.style.display = 'none';
            downloadBtn.style.display = 'none';
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(2) + ' MB';
        }

        extractBtn.onclick = async () => {
            if (!videoBlob) { alert('请先上传视频'); return; }

            extractBtn.disabled = true;
            extractBtn.textContent = '提取中...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            resultBox.style.display = 'none';
            downloadBtn.style.display = 'none';

            try {
                const audioBlob = await extractAudioFromVideo(videoBlob);
                const fmt = audioFormat.value;

                // 先解码录制的 WebM 音频为 AudioBuffer
                const ab = await audioBlob.arrayBuffer();
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const buf = await actx.decodeAudioData(ab);
                actx.close();

                let finalBlob;
                if (fmt === 'wav') {
                    const wavBuf = audioBufferToWav(buf);
                    finalBlob = new Blob([wavBuf], { type: 'audio/wav' });
                } else {
                    finalBlob = OggVorbisEncoder.encode(buf, 0.7);
                }

                audioUrl = URL.createObjectURL(finalBlob);

                sizeInfo.innerHTML =
                    '视频大小：' + formatSize(videoBlob.size) + '<br>' +
                    '提取音频：<span class="highlight">' + formatSize(finalBlob.size) + '</span><br>' +
                    '格式：<span class="highlight">' + fmt.toUpperCase() + '</span>';
                resultBox.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
            } catch (e) {
                alert('提取失败：' + e.message);
            } finally {
                extractBtn.disabled = false;
                extractBtn.textContent = '开始提取';
                progressBar.style.display = 'none';
            }
        };

        function extractAudioFromVideo(videoBlob) {
            return new Promise((resolve, reject) => {
                const video = document.createElement('video');
                video.preload = 'auto';
                video.volume = 0;

                const url = URL.createObjectURL(videoBlob);
                let timer = null, settled = false, recorder = null;

                function cleanup() {
                    if (timer) clearInterval(timer);
                    URL.revokeObjectURL(url);
                }

                function finish(err, blob) {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    if (err) reject(err);
                    else resolve(blob);
                }

                video.onloadedmetadata = () => {
                    const stream = video.captureStream();
                    const audioTracks = stream.getAudioTracks();

                    if (audioTracks.length === 0) {
                        // 尝试用 createMediaElementSource 兜底
                        tryMediaElementSource();
                        return;
                    }

                    const audioStream = new MediaStream(audioTracks);
                    const chunks = [];
                    let mimeType = 'audio/webm';
                    if (!MediaRecorder.isTypeSupported('audio/webm')) {
                        mimeType = 'audio/webm;codecs=opus';
                        if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
                    }

                    recorder = new MediaRecorder(audioStream, mimeType ? { mimeType } : {});

                    recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };

                    recorder.onstop = () => {
                        audioTracks.forEach(t => t.stop());
                        finish(null, new Blob(chunks, { type: mimeType || 'audio/webm' }));
                    };

                    recorder.onerror = () => finish(new Error('录制失败'));

                    recorder.start();

                    const duration = video.duration;
                    timer = setInterval(() => {
                        const pct = Math.min((video.currentTime / duration) * 100, 100);
                        progressFill.style.width = pct + '%';
                    }, 200);

                    video.play().catch(e => finish(new Error('视频播放失败：' + e.message)));
                };

                // createMediaElementSource 兜底方案
                function tryMediaElementSource() {
                    try {
                        const actx = new (window.AudioContext || window.webkitAudioContext)();
                        const source = actx.createMediaElementSource(video);
                        const dest = actx.createMediaStreamDestination();
                        source.connect(dest);
                        source.connect(actx.destination);

                        const chunks = [];
                        let mimeType = 'audio/webm';
                        if (!MediaRecorder.isTypeSupported('audio/webm')) {
                            mimeType = 'audio/webm;codecs=opus';
                            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
                        }

                        recorder = new MediaRecorder(dest.stream, mimeType ? { mimeType } : {});
                        recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };

                        recorder.onstop = () => {
                            try { source.disconnect(); } catch(e) {}
                            try { actx.close(); } catch(e) {}
                            finish(null, new Blob(chunks, { type: mimeType || 'audio/webm' }));
                        };

                        recorder.onerror = () => {
                            try { source.disconnect(); } catch(e) {}
                            try { actx.close(); } catch(e) {}
                            finish(new Error('录制失败'));
                        };

                        recorder.start();

                        const duration = video.duration;
                        timer = setInterval(() => {
                            const pct = Math.min((video.currentTime / duration) * 100, 100);
                            progressFill.style.width = pct + '%';
                        }, 200);

                        video.play().catch(e => {
                            try { source.disconnect(); } catch(e) {}
                            try { actx.close(); } catch(e) {}
                            finish(new Error('视频播放失败：' + e.message));
                        });
                    } catch(e) {
                        finish(new Error('无法提取音频：' + e.message));
                    }
                }

                video.onended = () => {
                    progressFill.style.width = '100%';
                    if (recorder && recorder.state === 'recording') {
                        setTimeout(() => {
                            if (recorder.state === 'recording') recorder.stop();
                        }, 200);
                    }
                };

                video.onerror = () => finish(new Error('视频加载失败，请检查文件格式'));

                video.src = url;
            });
        }

        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = audioUrl;
            const ext = audioFormat.value;
            a.download = videoOriginalName + '-音频.' + ext;
            a.click();
        };

        function audioBufferToWav(b) {
            let l = b.length * b.numberOfChannels * 2 + 44;
            let ab = new ArrayBuffer(l);
            let v = new DataView(ab);
            let p = 0;
            const s16 = (d) => { v.setUint16(p, d, true); p += 2; };
            const s32 = (d) => { v.setUint32(p, d, true); p += 4; };
            s32(0x46464952); s32(l - 8); s32(0x45564157);
            s32(0x20746D66); s32(16); s16(1); s16(b.numberOfChannels);
            s32(b.sampleRate); s32(b.sampleRate * 2 * b.numberOfChannels);
