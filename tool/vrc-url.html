    <script>
        const urlInput = document.getElementById('bilibili-url');
        const prefixInput = document.getElementById('prefix-url');
        const extractBtn = document.getElementById('extract-btn');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');
        const copyBtn = document.getElementById('copy-btn');
        const errorMsg = document.getElementById('error-msg');
        const pasteUrlBtn = document.getElementById('paste-url-btn');
        const pastePrefixBtn = document.getElementById('paste-prefix-btn');
        const toast = document.getElementById('toast');
        const tutorialBtnBilibili = document.getElementById('tutorial-btn-bilibili');

        extractBtn.addEventListener('click', function () {
            const url = urlInput.value.trim();
            const prefix = prefixInput.value.trim();

            errorMsg.style.display = 'none';
            resultArea.style.display = 'none';

            if (!url) {
                errorMsg.textContent = '请输入有效的B站链接！';
                errorMsg.style.display = 'block';
                return;
            }

            const bvPattern = /BV[a-zA-Z0-9]{10}/;
            const matchBv = url.match(bvPattern);

            if (!matchBv) {
                errorMsg.textContent = '未能从链接中提取到BV码，请检查链接是否正确！';
                errorMsg.style.display = 'block';
                return;
            }
            const bvCode = matchBv[0];
            let finalUrl = prefix + bvCode;

            const pPattern = /p=(\d+)/;
            const matchP = url.match(pPattern);
            if (matchP) {
                finalUrl += '&p=' + matchP[1];
            }

            resultText.textContent = finalUrl;
            resultArea.style.display = 'block';
        });

        copyBtn.addEventListener('click', async function () {
            try {
                await navigator.clipboard.writeText(resultText.textContent);
                showToast('复制成功！');
            } catch (err) {
                showToast('复制失败，请手动复制！');
                console.error(err);
            }
        });

        pasteUrlBtn.addEventListener('click', async function () {
            try {
                const text = await navigator.clipboard.readText();
                urlInput.value = text.trim();
                showToast('粘贴成功！');
            } catch (err) {
                showToast('粘贴失败，请手动粘贴！');
                console.error(err);
            }
        });

        pastePrefixBtn.addEventListener('click', async function () {
            try {
                const text = await navigator.clipboard.readText();
                prefixInput.value = text.trim();
                showToast('粘贴成功！');
            } catch (err) {
                showToast('粘贴失败，请手动粘贴！');
                console.error(err);
            }
        });

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        urlInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                extractBtn.click();
            }
        });

        tutorialBtnBilibili.addEventListener('click', function () {
            const tutorialUrl = 'https://www.bilibili.com/video/BV1GpcQzpEa9/?share_source=copy_web&vd_source=2b36761489223d0bcb938551a82ccb91';
            window.open(tutorialUrl, '_blank');
        });
