        <div class="upload-area" id="base64UploadArea">

            <div class="btn-row">

    <script src="common.js"></script>

    <script>
        const uploadArea = document.getElementById('base64UploadArea');
        const fileInput = document.getElementById('base64FileInput');
        const previewArea = document.getElementById('previewArea');
        const infoRow = document.getElementById('infoRow');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const fileDimensions = document.getElementById('fileDimensions');
        const base64Length = document.getElementById('base64Length');
        const base64OutputWrap = document.getElementById('base64OutputWrap');
        const base64Textarea = document.getElementById('base64Textarea');
        const dataUriArea = document.getElementById('dataUriArea');
        const dataUriInput = document.getElementById('dataUriInput');
        const copyBase64Btn = document.getElementById('copyBase64Btn');
        const downloadBase64Btn = document.getElementById('downloadBase64Btn');
        const copyDataUriBtn = document.getElementById('copyDataUriBtn');
        const copySuccess = document.getElementById('copySuccess');
        const copyDataUriSuccess = document.getElementById('copyDataUriSuccess');

        let currentDataUri = '';
        let currentBase64 = '';
        let currentFileName = '';

        uploadArea.onclick = () => { fileInput.value = ''; fileInput.click(); };
        fileInput.onchange = (e) => { if (e.target.files.length) processFile(e.target.files[0]); };

        uploadArea.ondrop = (e) => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            if (files.length) processFile(files[0]);
        };
        ['dragenter', 'dragover', 'dragleave'].forEach(ev => {
            uploadArea.addEventListener(ev, e => e.preventDefault());
        });

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentDataUri = e.target.result;
                // 提取纯 base64（去掉 data:image/xxx;base64, 前缀）
                currentBase64 = currentDataUri.split(',')[1] || '';

                // 预览
                previewArea.innerHTML = '<img src="' + currentDataUri + '" alt="预览">';

                // 信息
                const img = new Image();
                img.onload = () => {
                    fileDimensions.textContent = img.width + ' × ' + img.height;
                };
                img.src = currentDataUri;

                fileName.textContent = '文件名：' + file.name;
                currentFileName = file.name;
                fileSize.textContent = '大小：' + formatSize(file.size);
                base64Length.textContent = 'Base64长度：' + currentBase64.length.toLocaleString() + ' 字符';
                infoRow.style.display = 'flex';

                // 输出
                base64Textarea.value = currentBase64;
                base64OutputWrap.style.display = 'block';

                dataUriInput.value = currentDataUri;
                dataUriArea.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function copyToClipboard(text, successEl) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    successEl.classList.add('show');
                    setTimeout(() => successEl.classList.remove('show'), 1500);
                });
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                successEl.classList.add('show');
                setTimeout(() => successEl.classList.remove('show'), 1500);
            }
        }

        copyBase64Btn.onclick = () => {
            if (!currentBase64) return;
            copyToClipboard(currentBase64, copySuccess);
        };

        copyDataUriBtn.onclick = () => {
            if (!currentDataUri) return;
            copyToClipboard(currentDataUri, copyDataUriSuccess);
        };

        downloadBase64Btn.onclick = () => {
            if (!currentBase64) return;
            const baseName2 = currentFileName.replace(/\.[^.]+$/, '') || 'base64';
            const txtName = baseName2 + '-图片转Base64.txt';
            const blob = new Blob([currentBase64], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = txtName;
            a.click();
            URL.revokeObjectURL(url);
        };
    </script>
