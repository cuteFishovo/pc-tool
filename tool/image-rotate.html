    <script src="common.js"></script>

    <script>
        (function () {
            const mainUploadArea = document.getElementById('mainUploadArea');
            const mainFileInput = document.getElementById('mainFileInput');
            const actionArea = document.getElementById('actionArea');
            const previewCanvas = document.getElementById('previewCanvas');
            const downloadPanel = document.getElementById('downloadPanel');
            const downloadBtn = document.getElementById('downloadBtn');
            const outputFormat = document.getElementById('outputFormat');
            const origSizeEl = document.getElementById('origSize');
            const curSizeEl = document.getElementById('curSize');
            const curRotationEl = document.getElementById('curRotation');

            const btnRotateCCW = document.getElementById('btnRotateCCW');
            const btnRotateCW = document.getElementById('btnRotateCW');
            const btnFlipH = document.getElementById('btnFlipH');
            const btnFlipV = document.getElementById('btnFlipV');

            let originalImage = null;   // 原始上传的 Image 对象
            let currentCanvas = null;   // { width, height } — 当前画布状态
            let totalRotation = 0;       // 累计旋转角度 (0, 90, 180, 270)
            let flipH = false;           // 是否水平翻转
            let flipV = false;           // 是否垂直翻转
            let sourceFileName = '';

            // ===== Upload =====
            mainUploadArea.addEventListener('click', () => {
                mainFileInput.value = '';
                mainFileInput.click();
            });
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
                mainUploadArea.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
            });
            mainUploadArea.addEventListener('drop', (e) => {
                const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
                if (files.length) loadImage(files[0]);
            });
            mainFileInput.addEventListener('change', (e) => {
                if (e.target.files.length) loadImage(e.target.files[0]);
            });

            function loadImage(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        originalImage = img;
                        sourceFileName = file.name.replace(/\.[^.]+$/, '');
                        resetTransforms();
                        actionArea.style.display = '';
                        downloadPanel.style.display = '';
                        refreshCanvas();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }

            function resetTransforms() {
                totalRotation = 0;
                flipH = false;
                flipV = false;
                updateInfo();
            }

            function updateInfo() {
                if (!originalImage) return;
                origSizeEl.textContent = originalImage.width + ' x ' + originalImage.height;

                const state = getCanvasState(originalImage.width, originalImage.height);
                curSizeEl.textContent = state.width + ' x ' + state.height;

                let rotDisplay = totalRotation % 360;
                if (rotDisplay < 0) rotDisplay += 360;
                let desc = rotDisplay + '\u00B0';
                if (flipH || flipV) {
                    desc += ' +';
                    if (flipH) desc += ' 水平翻转';
                    if (flipV) desc += ' 垂直翻转';
                }
                curRotationEl.textContent = desc;
            }

            // 计算当前旋转状态下的画布尺寸
            function getCanvasState(origW, origH) {
                const rad = totalRotation * Math.PI / 180;
                const absCos = Math.abs(Math.cos(rad));
                const absSin = Math.abs(Math.sin(rad));
                // 浮点数误差处理：90度倍数时精确判断
                const r = ((totalRotation % 360) + 360) % 360;
                if (r === 90 || r === 270) {
                    return { width: origH, height: origW };
                }
                return { width: origW, height: origH };
            }

            function refreshCanvas() {
                if (!originalImage) return;

                const origW = originalImage.width;
                const origH = originalImage.height;
                const state = getCanvasState(origW, origH);
                const cw = state.width;
                const ch = state.height;

                previewCanvas.width = cw;
                previewCanvas.height = ch;
                previewCanvas.style.display = 'block';

                const ctx = previewCanvas.getContext('2d');
                ctx.clearRect(0, 0, cw, ch);

                ctx.save();

                // 在画布中心应用变换
                ctx.translate(cw / 2, ch / 2);

                // 水平翻转
                if (flipH) ctx.scale(-1, 1);
                // 垂直翻转
                if (flipV) ctx.scale(1, -1);

                // 旋转
                const rad = totalRotation * Math.PI / 180;
                ctx.rotate(rad);

                // 绘制原图，中心对齐
                ctx.drawImage(originalImage, -origW / 2, -origH / 2);

                ctx.restore();

                updateInfo();
            }

            // ===== Actions =====
            btnRotateCCW.addEventListener('click', () => {
                totalRotation = (totalRotation - 90) % 360;
                refreshCanvas();
            });

            btnRotateCW.addEventListener('click', () => {
                totalRotation = (totalRotation + 90) % 360;
                refreshCanvas();
            });

            btnFlipH.addEventListener('click', () => {
                flipH = !flipH;
                refreshCanvas();
            });

            btnFlipV.addEventListener('click', () => {
                flipV = !flipV;
                refreshCanvas();
            });

            // ===== Download =====
            downloadBtn.addEventListener('click', () => {
                const fmt = outputFormat.value;
                const dataUrl = previewCanvas.toDataURL('image/' + fmt, 0.95);
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = (sourceFileName || 'rotated') + '-图片旋转.' + fmt;
                a.click();
            });

            outputFormat.addEventListener('change', () => {}); // 格式变更无需重新渲染
        })();
    </script>
