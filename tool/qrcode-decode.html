        .preview-area img {

        }

        .result-box {

        .result-box.show {

        .result-label {

<body>
    <script>
        (function(){var u=navigator.userAgent||navigator.vendor||window.opera;var m=/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|webOS/i.test(u);var t=/iPad|Android(?!.*Mobile)|Tablet|PlayBook|Silk/i.test(u)||(/(?:Macintosh|Windows)/i.test(u)&&'ontouchend' in document&&window.innerWidth<=1024);if((m||t)&&window.location.pathname.indexOf('mobile.html')===-1)window.location.replace('../mobile.html');})();
    </script>
    <canvas id="bg-canvas" class="bg-canvas"></canvas>
    <a href="../index.html" class="back-link">← 返回工具首页</a>

    <div class="container" style="max-width:650px;">
        <h1>二维码解析</h1>
        <div class="subtitle">上传二维码图片，自动识别并读出其中的内容</div>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*">
            <div class="upload-text">点击上传或拖拽二维码图片到此处</div>
            <div class="upload-hint">支持 PNG / JPG / WebP 等常见图片格式</div>
        </div>

        <div class="preview-area" id="previewArea">
            <img id="previewImg" alt="Preview">
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="result-box" id="resultBox">
            <div class="result-label">解析结果</div>
            <div class="result-content" id="resultContent"></div>
            <div class="btn-row" id="btnRow" style="display:none;">
                <button class="copy-btn" id="copyBtn">复制内容</button>
                <a class="url-open-btn" id="urlOpenBtn" href="#" target="_blank" rel="noopener">打开链接</a>
            </div>
        </div>

        <div class="contact-tip">面向大众，有任何想要的功能或者意见，请联系QQ：<strong>1003294905</strong></div>
    </div>

    <script src="common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
    (function() {
        var uploadArea = document.getElementById('uploadArea');
        var fileInput = document.getElementById('fileInput');
        var previewArea = document.getElementById('previewArea');
        var previewImg = document.getElementById('previewImg');
        var resultBox = document.getElementById('resultBox');
        var resultContent = document.getElementById('resultContent');
        var errorBox = document.getElementById('errorBox');
        var btnRow = document.getElementById('btnRow');
        var copyBtn = document.getElementById('copyBtn');
        var urlOpenBtn = document.getElementById('urlOpenBtn');
        var currentResult = '';

        function isURL(text) {
            return /^https?:\/\/.+/.test(text);
        }

        function decodeQR(file) {
            if (!file || !file.type.match(/image\/(png|jpeg|webp|bmp|gif)/)) {
                showError('请上传有效的图片文件（PNG / JPG / WebP 等）');
                return;
            }

            errorBox.classList.remove('show');
            resultBox.classList.remove('show');
            btnRow.style.display = 'none';

            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    previewImg.src = e.target.result;
                    previewArea.classList.add('show');

                    var canvas = document.createElement('canvas');
                    var ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    var code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: 'dontInvert'
                    });

                    if (code) {
                        currentResult = code.data;
                        resultContent.textContent = currentResult;
                        resultBox.classList.add('show');
                        btnRow.style.display = 'flex';

                        if (isURL(currentResult)) {
                            resultContent.classList.add('is-url');
                            urlOpenBtn.href = currentResult;
                            urlOpenBtn.style.display = 'inline-block';
                        } else {
                            resultContent.classList.remove('is-url');
                            urlOpenBtn.style.display = 'none';
                        }
                    } else {
                        showError('未识别到二维码，请确认图片中包含有效的二维码');
                    }
                };
                img.onerror = function() {
                    showError('图片加载失败，请重试');
                };
                img.src = e.target.result;
            };
            reader.onerror = function() {
                showError('文件读取失败，请重试');
            };
            reader.readAsDataURL(file);
        }

        function showError(msg) {
            previewArea.classList.remove('show');
            resultBox.classList.remove('show');
            btnRow.style.display = 'none';
            errorBox.textContent = msg;
            errorBox.classList.add('show');
            uploadArea.classList.remove('has-file');
        }

        uploadArea.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function() {
            if (fileInput.files && fileInput.files[0]) {
                uploadArea.classList.add('has-file');
                decodeQR(fileInput.files[0]);
            }
        });

        // 拖拽上传
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function(evt) {
            uploadArea.addEventListener(evt, function(e) {
                e.preventDefault();
                e.stopPropagation();
            });
        });
        ['dragenter', 'dragover'].forEach(function(evt) {
            uploadArea.addEventListener(evt, function() {
                uploadArea.classList.add('drag-over');
            });
        });
        ['dragleave', 'drop'].forEach(function(evt) {
            uploadArea.addEventListener(evt, function() {
                uploadArea.classList.remove('drag-over');
            });
        });
        uploadArea.addEventListener('drop', function(e) {
            var files = e.dataTransfer.files;
            if (files && files[0]) {
                uploadArea.classList.add('has-file');
                decodeQR(files[0]);
            }
        });

        copyBtn.addEventListener('click', function() {
            if (!currentResult) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentResult).then(function() {
                    showToast('已复制到剪贴板');
                }).catch(function() {
                    fallbackCopy(currentResult);
                });
            } else {
                fallbackCopy(currentResult);
            }
        });

        function fallbackCopy(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast('已复制到剪贴板');
            } catch (e) {
                showToast('复制失败，请手动复制');
            }
            document.body.removeChild(ta);
        }
    })();
    </script>
</body>
